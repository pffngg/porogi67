<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Технические работы</title>
  <style>
    /* Общий сброс и фон */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 10%, #0b0f1a, #030508);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    .card {
      position: relative;
      max-width: 780px;
      width: 100%;
      background: rgba(18, 26, 40, 0.6);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 56px;
      padding: 48px 40px 56px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(120, 180, 255, 0.15);
      overflow: hidden;
      transition: box-shadow 0.4s ease;
      text-align: center;
      color: #f0f7ff;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* Анимированный фон за карточкой (пульсирующие кольца) */
    .card::before {
      content: '';
      position: absolute;
      top: -60%;
      left: -30%;
      width: 160%;
      height: 160%;
      background: radial-gradient(circle at 30% 40%, rgba(0, 180, 255, 0.08), transparent 60%);
      animation: breatheGlow 8s infinite alternate ease-in-out;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes breatheGlow {
      0% { transform: scale(1) translate(0, 0); opacity: 0.4; }
      100% { transform: scale(1.2) translate(5%, -5%); opacity: 0.9; }
    }

    /* Все содержимое поверх фона */
    .card > * {
      position: relative;
      z-index: 2;
    }

    /* Заголовок с иконкой */
    .header-icon {
      display: inline-block;
      font-size: 4.2rem;
      line-height: 1;
      margin-bottom: 6px;
      animation: floatIcon 3s infinite ease-in-out;
      filter: drop-shadow(0 8px 20px rgba(0, 140, 255, 0.3));
      cursor: default;
    }

    @keyframes floatIcon {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(4deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #d6eaff, #8fcbff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(60, 160, 255, 0.2);
      margin-top: 4px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(200, 225, 255, 0.7);
      margin-top: 8px;
      font-weight: 300;
      letter-spacing: 0.3px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
      padding-bottom: 18px;
    }

    /* Блок с сообщением от администратора */
    .admin-message-block {
      background: rgba(0, 40, 80, 0.2);
      border-radius: 20px;
      padding: 18px 24px;
      margin: 16px auto 22px;
      border: 1px solid rgba(100, 180, 255, 0.08);
      backdrop-filter: blur(4px);
      max-width: 90%;
      transition: all 0.3s ease;
    }

    .admin-message-block .message-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(180, 210, 255, 0.3);
      margin-bottom: 8px;
    }

    .admin-message-block .message-content {
      font-size: 1.1rem;
      font-weight: 400;
      color: #d6eaff;
      line-height: 1.5;
      word-break: break-word;
    }

    .admin-message-block .message-content.empty {
      color: rgba(255, 255, 255, 0.15);
      font-style: italic;
      font-weight: 300;
    }

    /* Таймер */
    .timer-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 24px 0 28px;
      flex-wrap: wrap;
    }

    .timer-item {
      background: rgba(0, 20, 40, 0.35);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 12px 16px 8px;
      min-width: 80px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 20px rgba(0, 100, 255, 0.05);
      transition: transform 0.25s ease, border-color 0.3s;
    }

    .timer-item:hover {
      transform: scale(1.04);
      border-color: rgba(100, 180, 255, 0.3);
    }

    .timer-number {
      font-size: 3.2rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(to bottom, #f0f9ff, #b0d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: block;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0, 160, 255, 0.3);
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(180, 215, 255, 0.6);
      margin-top: 6px;
      font-weight: 400;
    }

    /* Блок даты окончания */
    .end-date-block {
      background: rgba(0, 30, 60, 0.3);
      border-radius: 60px;
      padding: 14px 22px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin: 8px auto 22px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .end-date-block span:first-child {
      opacity: 0.7;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .end-date-block .date-value {
      font-weight: 600;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #b6dbff;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
    }

    /* Админ-панель (скрыта от обычных пользователей) */
    .admin-panel {
      margin-top: 20px;
      padding: 20px 24px 24px;
      background: rgba(0, 10, 30, 0.6);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      display: none;
      text-align: left;
    }

    .admin-panel.visible {
      display: block;
    }

    .admin-panel .panel-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(180, 210, 255, 0.3);
      margin-bottom: 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      padding-bottom: 12px;
    }

    .admin-panel .form-group {
      margin-bottom: 16px;
    }

    .admin-panel label {
      display: block;
      font-size: 0.8rem;
      color: rgba(200, 225, 255, 0.5);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .admin-panel input[type="datetime-local"],
    .admin-panel textarea {
      width: 100%;
      background: rgba(0, 10, 25, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 10px 16px;
      color: #d4eaff;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s;
      font-family: inherit;
      box-sizing: border-box;
    }

    .admin-panel input[type="datetime-local"]:focus,
    .admin-panel textarea:focus {
      border-color: #4c9aff;
      box-shadow: 0 0 0 3px rgba(60, 150, 255, 0.1);
    }

    .admin-panel textarea {
      resize: vertical;
      min-height: 60px;
      line-height: 1.5;
    }

    .admin-panel .btn-set {
      background: rgba(60, 150, 255, 0.12);
      border: 1px solid rgba(100, 180, 255, 0.15);
      color: #c6e0ff;
      padding: 10px 28px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s ease;
      width: 100%;
      margin-top: 4px;
    }

    .admin-panel .btn-set:hover {
      background: rgba(60, 150, 255, 0.2);
      border-color: #4c9aff;
    }

    .admin-hint {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.1);
      margin-top: 12px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* сообщение о завершении */
    .finished-message {
      font-size: 1.8rem;
      font-weight: 600;
      color: #a0d0ff;
      text-shadow: 0 0 30px rgba(0, 180, 255, 0.3);
      padding: 12px 0;
      letter-spacing: 1px;
      background: rgba(0, 255, 200, 0.03);
      border-radius: 60px;
      border: 1px solid rgba(0, 255, 200, 0.08);
      backdrop-filter: blur(4px);
    }

    .footer-note {
      margin-top: 26px;
      font-size: 0.8rem;
      color: rgba(180, 210, 255, 0.2);
      letter-spacing: 1px;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      padding-top: 20px;
    }

    /* Адаптивность */
    @media (max-width: 550px) {
      .card { padding: 32px 20px 40px; }
      h1 { font-size: 2.2rem; }
      .timer-grid { gap: 10px; }
      .timer-item { min-width: 65px; padding: 10px 10px 6px; }
      .timer-number { font-size: 2.4rem; }
      .end-date-block { font-size: 0.9rem; }
      .admin-message-block { padding: 14px 16px; }
      .admin-message-block .message-content { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Иконка с анимацией -->
    <div class="header-icon" id="headerIcon">⚙️</div>
    <h1>Технические работы</h1>
    <div class="subtitle">Мы обновляем сервис, чтобы сделать его ещё лучше</div>

    <!-- Блок с сообщением от администратора -->
    <div class="admin-message-block" id="messageBlock">
      <div class="message-label">📢 Объявление</div>
      <div class="message-content empty" id="messageContent">Пока нет сообщений</div>
    </div>

    <!-- Таймер -->
    <div class="timer-grid" id="timerGrid">
      <div class="timer-item">
        <span class="timer-number" id="days">00</span>
        <span class="timer-label">Дней</span>
      </div>
      <div class="timer-item">
        <span class="timer-number" id="hours">00</span>
        <span class="timer-label">Часов</span>
      </div>
      <div class="timer-item">
        <span class="timer-number" id="minutes">00</span>
        <span class="timer-label">Минут</span>
      </div>
      <div class="timer-item">
        <span class="timer-number" id="seconds">00</span>
        <span class="timer-label">Секунд</span>
      </div>
    </div>

    <!-- Дата окончания (отображается) -->
    <div class="end-date-block" id="endDateDisplay">
      <span>⏳ Окончание работ:</span>
      <span class="date-value" id="endDateText">—</span>
    </div>

    <!-- Админ-панель (скрыта от обычных пользователей) -->
    <div class="admin-panel" id="adminPanel">
      <div class="panel-title">🔐 Панель администратора</div>

      <div class="form-group">
        <label for="adminMessage">📝 Текст объявления (видят все)</label>
        <textarea id="adminMessage" placeholder="Напишите что-нибудь... Например: «Обновление займёт ещё 2 часа. Приносим извинения!»"></textarea>
      </div>

      <div class="form-group">
        <label for="endDateTime">📅 Дата окончания работ</label>
        <input type="datetime-local" id="endDateTime">
      </div>

      <button class="btn-set" id="setDateBtn">✅ Применить изменения</button>
      <div class="admin-hint">Двойной клик по ⚙️ чтобы открыть/закрыть панель</div>
    </div>

    <!-- Сообщение, когда таймер истёк -->
    <div id="finishedMessage" class="finished-message" style="display: none;">✅ Работы завершены!</div>

    <div class="footer-note">Следите за обновлениями</div>
  </div>

  <script>
    (function() {
      "use strict";

      // ---------- НАСТРОЙКА: ДАТА ОКОНЧАНИЯ (ИЗМЕНЯЙТЕ ЗДЕСЬ) ----------
      function getDefaultEndDate() {
        const d = new Date();
        d.setDate(d.getDate() + 3);  // +3 дня
        d.setHours(20, 0, 0, 0);     // 20:00
        return d;
      }

      // ЗДЕСЬ МОЖНО УСТАНОВИТЬ СВОЮ ДАТУ (раскомментируйте и замените)
      // const FIXED_END_DATE = new Date('2026-07-05T18:30:00');
      // Если используете FIXED_END_DATE, закомментируйте getDefaultEndDate() ниже

      const END_DATE = getDefaultEndDate();

      // ---------- НАСТРОЙКА: ТЕКСТ СООБЩЕНИЯ ПО УМОЛЧАНИЮ ----------
      const DEFAULT_MESSAGE = 'Ведутся плановые технические работы. Спасибо за понимание! 🙏';
      // ----------------------------------------------------------------

      // DOM-элементы
      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');
      const endDateText = document.getElementById('endDateText');
      const endDateTimeInput = document.getElementById('endDateTime');
      const setDateBtn = document.getElementById('setDateBtn');
      const timerGrid = document.getElementById('timerGrid');
      const finishedMessage = document.getElementById('finishedMessage');
      const adminPanel = document.getElementById('adminPanel');
      const headerIcon = document.getElementById('headerIcon');
      const messageContent = document.getElementById('messageContent');
      const adminMessageTextarea = document.getElementById('adminMessage');

      // Текущая конечная дата
      let endDate = new Date(END_DATE.getTime());

      // Текущее сообщение
      let currentMessage = '';

      let intervalId = null;
      let isFinished = false;

      // ---------- Функции ----------
      function padZero(num) {
        return String(num).padStart(2, '0');
      }

      // Обновление сообщения на странице
      function updateMessage(text) {
        currentMessage = text;
        if (text && text.trim().length > 0) {
          messageContent.textContent = text;
          messageContent.className = 'message-content';
        } else {
          messageContent.textContent = 'Пока нет сообщений';
          messageContent.className = 'message-content empty';
        }
        // Сохраняем в localStorage
        try {
          localStorage.setItem('adminMessage', text);
        } catch (e) { /* ignore */ }
      }

      // Обновление таймера
      function updateTimer() {
        if (!endDate) {
          daysEl.textContent = '--';
          hoursEl.textContent = '--';
          minutesEl.textContent = '--';
          secondsEl.textContent = '--';
          endDateText.textContent = '—';
          return;
        }

        const now = new Date();
        const diff = endDate.getTime() - now.getTime();

        if (diff <= 0) {
          if (!isFinished) {
            isFinished = true;
            if (intervalId) {
              clearInterval(intervalId);
              intervalId = null;
            }
            timerGrid.style.display = 'none';
            finishedMessage.style.display = 'block';
            endDateText.textContent = endDate.toLocaleString('ru-RU', {
              day: '2-digit', month: '2-digit', year: 'numeric',
              hour: '2-digit', minute: '2-digit'
            });
          }
          return;
        }

        if (isFinished) {
          isFinished = false;
          timerGrid.style.display = 'flex';
          finishedMessage.style.display = 'none';
        }

        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = Math.floor(totalSeconds % 60);

        daysEl.textContent = padZero(days);
        hoursEl.textContent = padZero(hours);
        minutesEl.textContent = padZero(minutes);
        secondsEl.textContent = padZero(seconds);

        endDateText.textContent = endDate.toLocaleString('ru-RU', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      }

      // Установка новой даты
      function setNewEndDate(dateString) {
        if (!dateString) return;

        const parsed = new Date(dateString);
        if (isNaN(parsed.getTime())) {
          alert('Некорректная дата.');
          return;
        }

        endDate = parsed;

        if (isFinished) {
          isFinished = false;
          timerGrid.style.display = 'flex';
          finishedMessage.style.display = 'none';
        }

        if (!intervalId) {
          intervalId = setInterval(updateTimer, 500);
        }

        updateTimer();

        try {
          localStorage.setItem('maintenanceEndDate', dateString);
        } catch (e) { /* ignore */ }
      }

      // Загрузка сохранённой даты
      function loadSavedDate() {
        try {
          const saved = localStorage.getItem('maintenanceEndDate');
          if (saved) {
            const parsed = new Date(saved);
            if (!isNaN(parsed.getTime())) {
              endDate = parsed;
              return true;
            }
          }
        } catch (e) { /* ignore */ }
        return false;
      }

      // Загрузка сохранённого сообщения
      function loadSavedMessage() {
        try {
          const saved = localStorage.getItem('adminMessage');
          if (saved !== null) {
            updateMessage(saved);
            return true;
          }
        } catch (e) { /* ignore */ }
        return false;
      }

      // ---------- Показать/скрыть админ-панель ----------
      headerIcon.addEventListener('dblclick', function(e) {
        e.preventDefault();
        adminPanel.classList.toggle('visible');

        if (adminPanel.classList.contains('visible')) {
          // Синхронизируем поля с текущими значениями
          if (endDate) {
            const d = endDate;
            const year = d.getFullYear();
            const month = padZero(d.getMonth() + 1);
            const day = padZero(d.getDate());
            const hours = padZero(d.getHours());
            const minutes = padZero(d.getMinutes());
            endDateTimeInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
          }
          adminMessageTextarea.value = currentMessage;
        }
      });

      // ---------- Обработчик кнопки "Применить" ----------
      setDateBtn.addEventListener('click', function() {
        // Обновляем дату
        const dateVal = endDateTimeInput.value;
        if (dateVal) {
          setNewEndDate(dateVal);
        }

        // Обновляем сообщение
        const msg = adminMessageTextarea.value;
        updateMessage(msg);

        // Показываем уведомление
        const btn = setDateBtn;
        const originalText = btn.textContent;
        btn.textContent = '✅ Готово!';
        setTimeout(() => {
          btn.textContent = originalText;
        }, 1500);
      });

      // ---------- Инициализация ----------
      // Загружаем дату
      const hasSaved = loadSavedDate();
      if (!hasSaved) {
        endDate = new Date(END_DATE.getTime());
      }

      // Загружаем сообщение
      const hasMessage = loadSavedMessage();
      if (!hasMessage) {
        updateMessage(DEFAULT_MESSAGE);
      }

      // Синхронизируем input с текущей датой
      if (endDate) {
        const d = endDate;
        const year = d.getFullYear();
        const month = padZero(d.getMonth() + 1);
        const day = padZero(d.getDate());
        const hours = padZero(d.getHours());
        const minutes = padZero(d.getMinutes());
        endDateTimeInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
      }

      // Запускаем таймер
      if (!intervalId) {
        intervalId = setInterval(updateTimer, 500);
      }
      updateTimer();

      // Проверка на случай, если дата уже в прошлом
      setTimeout(() => {
        if (endDate) {
          const now = new Date();
          if (endDate.getTime() <= now.getTime()) {
            updateTimer();
          }
        }
      }, 100);

      // Обновление при возвращении на вкладку
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && endDate) {
          updateTimer();
        }
      });

      console.log('🔧 Двойной клик по ⚙️ для открытия панели администратора');
      console.log(`📅 Дата окончания: ${endDate ? endDate.toLocaleString() : 'не установлена'}`);
      console.log(`📝 Текущее сообщение: "${currentMessage}"`);

    })();
  </script>
</body>
</html>
