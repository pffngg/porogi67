* { box-sizing: border-box; }

.preview-remove { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; opacity: 0; transition: opacity 0.2s ease; }

.mute-banner { display: none; background: rgba(255,0,0,0.12); color: #ffb5b5; border: 1px solid rgba(255,0,0,0.25); border-radius: 22px; padding: 12px 14px; text-align: center; margin-bottom: 10px; font-weight: 700; }

function login() {
  const n = document.getElementById("nameInput").value.trim();
  if (!n) return;
  if (/[.$#[\]/]/.test(n)) { alert("Имя не должно содержать символы . $ # [ ] /"); return; }
  if (document.getElementById("codeInput").value !== "67") return;

  getMyIp().then(ip => {
      if (!ip) { alert("Не удалось определить IP. Попробуйте снова."); return; }
      const ipKey = dbKey(ip);
      db.ref(`blocked_ips/${ipKey}`).once("value").then(snap => {
          if (snap.exists() && n.toLowerCase() !== "дениска") {
              alert("Ваш IP заблокирован. Обратитесь к администратору.");
              return;
          }
          localStorage.setItem("userName", n);
          localStorage.setItem("userIp", ip);
          db.ref(`users/${n}`).update({ ip, lastSeen: Date.now() });
          location.reload();
      });
  });
}

function showApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("btn-settings").style.display = "none";
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("adminUsersPanel").style.display = "none";

  db.ref("admins").on("value", snap => {
      const admins = snap.val() || {};
      isAdmin = !!admins[currentUser] || currentUser.toLowerCase() === "дениска";
      document.getElementById("userTag").innerText = isAdmin ? "💀 " + currentUser : "@" + currentUser.toLowerCase();
      document.getElementById("btn-settings").style.display = isAdmin ? "inline-flex" : "none";
      document.getElementById("adminPanel").style.display = isAdmin ? "flex" : "none";
      document.getElementById("adminUsersPanel").style.display = isAdmin ? "block" : "none";
      if (isAdmin && !adminListenersInitialized) {
          listenAdminUsers();
          adminListenersInitialized = true;
      }
  });

  db.ref("users").on("value", snap => {
      latestUsers = snap.val() || {};
      userAvatars = latestUsers;
      const myAv = userAvatars[currentUser]?.avatar || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
      document.getElementById("myAvatar").src = myAv;
      const profileAvatar = document.getElementById("profileAvatarPreview");
      if (profileAvatar) profileAvatar.src = myAv;
      renderOnlineUsers();
  });

  db.ref("muted_users").on("value", snap => {
      mutedUsers = snap.val() || {};
      isMuted = !!mutedUsers[currentUser];
      renderMuteState();
      if (isAdmin) renderAdminUsers(latestUsers, currentBlockedIps, currentAdmins);
  });

  setupPresence(); listenChat(); renderSched(); listenHistory(); listenActiveShift();
  fetchAndStoreMyIp();
  window.onclick = () => document.getElementById("context-menu").style.display = "none";
}

function showProfileModal(userName = currentUser) {
    cancelAvatarEdit();
    profileViewUser = userName;
    profileEditable = userName === currentUser;
    document.getElementById("profileName").innerText = userName + (profileEditable ? "" : " (просмотр)");
    document.getElementById("profileRole").innerText = profileEditable ? (isAdmin ? "Администратор" : "") : (userAvatars[userName]?.admin ? "Администратор" : "");

function loadProfileStats(userName = currentUser) {
    db.ref("shifts").orderByChild("date").once("value").then(snap => {
        let totalSalary = 0;
        let shiftsCount = 0;
        let totalOrders = 0;
        let totalOpt = 0;
        snap.forEach(child => {
            const d = child.val();
            if (d.participants && d.participants[userName]) {
                shiftsCount++;
                const myData = d.participants[userName];
                totalSalary += myData.earned || 0;
                totalOrders += myData.orders || ((d.total || 0) / (d.numParticipants || 1));
                totalOpt += myData.optOrders || ((d.opt || 0) / (d.numParticipants || 1));
            }
        });
        document.getElementById("profileStats").innerHTML = `
            <div>Смен отработано: <b>${shiftsCount}</b></div>
            <div>Всего заказов: <b>${Math.round(totalOrders)}</b></div>
            <div>Оптовых заказов: <b>${Math.round(totalOpt)}</b></div>
            <div>Заработано всего: <b>${Math.round(totalSalary)} ₽</b></div>
        `;
        const profileAvatar = document.getElementById("profileAvatarPreview");
        if (profileAvatar && userAvatars[userName]) profileAvatar.src = userAvatars[userName].avatar || profileAvatar.src;
    });
}

function startShift() {

        participants: { [currentUser]: createParticipantData(Date.now()) },

    });
}

function joinShift() {
    db.ref("active_shift").once("value", snap => {
        const shift = snap.val() || {};
        const existing = (shift.allParticipants && shift.allParticipants[currentUser]) || createParticipantData(Date.now());
        db.ref("active_shift/participants/" + currentUser).set(createParticipantData(Date.now()));
        db.ref("active_shift/allParticipants/" + currentUser).set(existing);
    });
}

function getOrderShare(type) {
    return type === 'opt' ? 50 : 80;
}

function createParticipantData(joinedAt = Date.now()) {
    return {
        earned: 0,
        joinedAt,
        orders: 0,
        optOrders: 0,
        cdekOrders: 0,
        wbOrders: 0,
        dostOrders: 0
    };
}

function addCounter(type) {
    db.ref("active_shift").transaction(shift => {
        if (!shift || !shift.participants || !shift.participants[currentUser]) {
            return;
        }
        shift[type] = (shift[type] || 0) + 1;
        const parts = Object.keys(shift.participants);
        const share = getOrderShare(type) / parts.length;
        const orderIncrement = parts.length === 1 ? 1 : 1 / parts.length;
        parts.forEach(p => {
            const part = shift.participants[p] = shift.participants[p] || createParticipantData();
            part.earned = (part.earned || 0) + share;
            part.orders = (part.orders || 0) + orderIncrement;
            if (type === 'opt') {
                part.optOrders = (part.optOrders || 0) + orderIncrement;
            } else if (type === 'cdek') {
                part.cdekOrders = (part.cdekOrders || 0) + orderIncrement;
            } else if (type === 'wb') {
                part.wbOrders = (part.wbOrders || 0) + orderIncrement;
            } else if (type === 'dost') {
                part.dostOrders = (part.dostOrders || 0) + orderIncrement;
            }
        });
        return shift;
    });
}

function removeCounter(type) {
    db.ref("active_shift").transaction(shift => {
        if (!shift || !shift.participants || !shift.participants[currentUser] || !shift[type] || shift[type] <= 0) {
            return;
        }
        shift[type]--;
        const parts = Object.keys(shift.participants);
        const share = getOrderShare(type) / parts.length;
        const orderDecrement = parts.length === 1 ? 1 : 1 / parts.length;
        parts.forEach(p => {
            const part = shift.participants[p];
            if (!part) return;
            part.earned = Math.max(0, (part.earned || 0) - share);
            part.orders = Math.max(0, (part.orders || 0) - orderDecrement);
            if (type === 'opt') {
                part.optOrders = Math.max(0, (part.optOrders || 0) - orderDecrement);
            } else if (type === 'cdek') {
                part.cdekOrders = Math.max(0, (part.cdekOrders || 0) - orderDecrement);
            } else if (type === 'wb') {
                part.wbOrders = Math.max(0, (part.wbOrders || 0) - orderDecrement);
            } else if (type === 'dost') {
                part.dostOrders = Math.max(0, (part.dostOrders || 0) - orderDecrement);
            }
        });
        return shift;
    });
}

function manualInput(type) {
    if (!isGlobalParticipant) return;

    db.ref("active_shift").once("value", snap => {
        const shift = snap.val();
        if(!shift || !shift.participants || !shift.participants[currentUser]) return;
        let currentVal = shift[type] || 0;
        let v = prompt("Введи новое количество заказов:", currentVal);
        if(v && !isNaN(v)) {
            let newVal = parseInt(v);
            let diff = newVal - currentVal;
            if(diff !== 0) {
                db.ref("active_shift").transaction(s => {
                    if (!s || !s.participants || !s.participants[currentUser]) return;
                    s[type] = newVal;
                    const parts = Object.keys(s.participants);
                    const share = (diff * getOrderShare(type)) / parts.length;
                    const orderDelta = parts.length === 1 ? diff : diff / parts.length;
                    parts.forEach(p => {
                        const part = s.participants[p] = s.participants[p] || createParticipantData();
                        part.earned = Math.max(0, (part.earned || 0) + share);
                        part.orders = Math.max(0, (part.orders || 0) + orderDelta);
                        if (type === 'opt') {
                            part.optOrders = Math.max(0, (part.optOrders || 0) + orderDelta);
                        } else if (type === 'cdek') {
                            part.cdekOrders = Math.max(0, (part.cdekOrders || 0) + orderDelta);
                        } else if (type === 'wb') {
                            part.wbOrders = Math.max(0, (part.wbOrders || 0) + orderDelta);
                        } else if (type === 'dost') {
                            part.dostOrders = Math.max(0, (part.dostOrders || 0) + orderDelta);
                        }
                    });
                    return s;
                }); 
            }
        }
    });
}

function leaveShift() {
    db.ref("active_shift").once("value", snap => {
        const shift = snap.val();
        if(!shift || !shift.participants || !shift.participants[currentUser]) return;

        const myEarned = shift.participants[currentUser].earned || 0;
        const cdekCount = shift.cdek || 0;
        const wbCount = shift.wb || 0;
        const dostCount = shift.dost || 0;
        const optCount = shift.opt || 0;
        const totalCount = cdekCount + wbCount + dostCount;
        const startT = new Date(shift.startTime || Date.now());
        const endT = new Date();

        const reportText = `
            <b>Вы вышли со смены!</b><br><br>
            Общая статистика смены:<br>
            Заказы: ${totalCount} | Оптовые: ${optCount}<br><br>
            <span style="color:var(--accent); font-weight:800; font-size:22px;">Твоя доля: ${myEarned.toFixed(0)}₽</span><br><br>
            <span style="font-size:12px; color:#888;">${startT.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${endT.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
        `;
        document.getElementById("reportDetails").innerHTML = reportText;
        document.getElementById("reportModal").style.display = "flex";

        const allParticipants = Object.assign({}, shift.allParticipants || {}, shift.participants || {});
        const participantCount = Object.keys(shift.participants).length;
        const currentMember = shift.participants[currentUser];
        if (currentMember) {
            allParticipants[currentUser] = currentMember;
        }

        if (participantCount <= 1) {
            // Записать смену в архив
            const numParts = Object.keys(allParticipants).length;
            const totalSalary = Object.values(allParticipants).reduce((sum, p) => sum + (p.earned || 0), 0);
            db.ref("shifts").push({
                date: startT.toLocaleDateString(),
                total: totalCount,
                cdek: cdekCount,
                wb: wbCount,
                dost: dostCount,
                opt: optCount,
                totalSalary: totalSalary,
                numParticipants: numParts,
                participants: allParticipants,
                start: startT.toLocaleString(),
                end: endT.toLocaleString()
            });
            db.ref("active_shift").remove();
        } else {
            db.ref("active_shift/allParticipants").set(allParticipants);
            db.ref("active_shift/participants/" + currentUser).remove();
        }
    });
}

function listenChat() {
    const box = document.getElementById("chat-messages");
    db.ref("chat_v4").limitToLast(30).on("value", snap => {
        box.innerHTML = ""; let unread = 0;
        snap.forEach(s => {
            const m = s.val();
            if (m.time > lastChatViewTime && m.name !== currentUser) unread++;
            appendMsgUI(s.key, m, false);
        });
        if(currentTab !== 'chat') updateBadge(unread);
        if(!chatInitialized) { box.scrollTop = box.scrollHeight; chatInitialized = true; }
        if(currentTab === 'chat') db.ref("chat_v4").limitToLast(1).once("child_added", s => { if(s.val().name !== currentUser) db.ref("chat_v4/"+s.key+"/readBy").child(currentUser).set(true); });
    });
}

function appendMsgUI(key, m, scroll) {
    const box = document.getElementById("chat-messages");
    const isMe = m.name === currentUser;
    const wrapper = document.createElement("div");
    wrapper.className = `msg-wrapper ${isMe ? "me-wrapper" : ""}`;
    wrapper.dataset.key = key;

    const av = userAvatars[m.name]?.avatar || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    const time = formatChatTimestamp(m.time);
    let ticks = "✓";
    if (m.readBy && Object.keys(m.readBy).length > 0) ticks = "✓✓";
    const tickClass = ticks === "✓✓" ? "read" : "";

    const avatarImg = document.createElement("img");
    avatarImg.className = "avatar";
    avatarImg.style.width = "28px";
    avatarImg.style.height = "28px";
    avatarImg.src = av;
    wrapper.appendChild(avatarImg);

    const msg = document.createElement("div");
    msg.className = `msg ${isMe ? "me" : "others"}`;

    const isSenderAdmin = String(m.name).toLowerCase() === "дениска";
    const userLabel = document.createElement("small");
    userLabel.style.cssText = "font-size:10px; font-weight:700; opacity:0.8; display:flex; align-items:center; gap:6px;";
    userLabel.textContent = m.name;
    if (isSenderAdmin) {
        const adminTag = document.createElement("span");
        adminTag.style.cssText = "font-size:9px; color:#aaa; text-transform:uppercase; letter-spacing:0.05em;";
        adminTag.textContent = "admin";
        userLabel.appendChild(adminTag);
    }
    msg.appendChild(userLabel);

    if (m.images && Array.isArray(m.images)) {
        const gallery = document.createElement("div");
        gallery.style.cssText = "display:grid; grid-template-columns:repeat(auto-fit,minmax(80px,1fr)); gap:4px; margin:5px 0;";
        m.images.forEach(src => {
            const img = document.createElement("img");
            img.src = src;
            img.style.cssText = "width:100%; border-radius:10px; cursor:pointer;";
            img.addEventListener("click", () => openFullImg(src));
            gallery.appendChild(img);
        });
        msg.appendChild(gallery);
    }

    const textEl = document.createElement("div");
    textEl.textContent = m.text || "";
    msg.appendChild(textEl);

    const info = document.createElement("div");
    info.className = "msg-info";
    const timeSpan = document.createElement("span");
    timeSpan.textContent = time;
    info.appendChild(timeSpan);
    if (isMe) {
        const tickSpan = document.createElement("span");
        tickSpan.className = `ticks ${tickClass}`;
        tickSpan.textContent = ticks;
        info.appendChild(tickSpan);
    }
    msg.appendChild(info);

    let longPressTimer = null;
    const startLongPress = () => {
        if (!isAdmin) return;
        longPressTimer = setTimeout(() => {
            if (confirm('Удалить сообщение?')) {
                db.ref('chat_v4/' + key).remove();
            }
        }, 700);
    };
    const cancelLongPress = () => {
        if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
        }
    };

    wrapper.addEventListener('touchstart', startLongPress);
    wrapper.addEventListener('touchend', cancelLongPress);
    wrapper.addEventListener('touchmove', cancelLongPress);
    wrapper.addEventListener('touchcancel', cancelLongPress);
    msg.addEventListener("contextmenu", e => showCtx(e, key, m.name));
    wrapper.appendChild(msg);
    wrapper.classList.add('enter');
    box.appendChild(wrapper);
    requestAnimationFrame(() => wrapper.classList.remove('enter'));

    if (scroll) box.scrollTo({ top: box.scrollHeight, behavior: "smooth" });
}

async function preparePhotos(input) {
    const files = Array.from(input.files).slice(0, 10 - pendingPhotos.length);
    if(!files.length) return;
    const previewBox = document.getElementById("preview-imgs");
    for (let f of files) {
        const b = await new Promise(res => {
            const r = new FileReader(); r.onload = e => {
                const img = new Image(); img.onload = () => {
                    const c = document.createElement('canvas'); const max = 800; let w=img.width, h=img.height;
                    if(w>h && w>max) { h*=max/w; w=max; } else if(h>max) { w*=max/h; h=max; }
                    c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); res(c.toDataURL('image/jpeg', 0.7));
                }; img.src = e.target.result;
            }; r.readAsDataURL(f);
        });
        pendingPhotos.push(b);
    }
    renderPreviewArea();
}

function renderPreviewArea() {
    const previewArea = document.getElementById("preview-area");
    const previewBox = document.getElementById("preview-imgs");
    previewBox.innerHTML = "";

    if (pendingPhotos.length) {
        const previewPhotos = pendingPhotos.slice(0, 10);
        previewPhotos.forEach((src, index) => {
            const thumb = document.createElement('div');
            thumb.className = 'preview-thumb';
            thumb.innerHTML = `
                <img src="${src}">
                <div class="preview-remove" onclick="removePreviewPhoto(${index})">×</div>
            `;
            previewBox.appendChild(thumb);
        });
        previewBox.style.display = 'flex';
    } else {
        previewBox.style.display = 'none';
    }

    previewArea.style.display = pendingPhotos.length ? 'block' : 'none';
}

function removePreviewPhoto(index) {
    pendingPhotos.splice(index, 1);
    renderPreviewArea();
}


function sendChat() {
    const msgInput = document.getElementById("chatMsg");
    const text = msgInput.value.trim();
    if (isMuted) {
        renderMuteState();
        return;
    }
    if (!text && !pendingPhotos.length) return;
    db.ref("chat_v4").push({ name: currentUser, text: text, images: pendingPhotos.length ? pendingPhotos : null, time: Date.now() });
    msgInput.value = "";
    pendingPhotos = [];
    renderPreviewArea();
}

function handleChatKey(event) {
    if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendChat();
    }
}

function switchTab(t) {
    currentTab = t;
    ["view-main", "view-sched", "view-chat", "view-settings"].forEach(v => document.getElementById(v).style.display = "none");
    ["btn-main", "btn-sched", "btn-chat", "btn-settings"].forEach(b => document.getElementById(b).className = "glass-btn");
    if(document.getElementById("btn-"+t)) document.getElementById("btn-"+t).className = "primary";
    document.getElementById("view-"+t).style.display = t==='chat'?'flex':'block';
    if(t==='chat') {
        lastChatViewTime = Date.now(); localStorage.setItem("lastChatView", lastChatViewTime);
        updateBadge(0);
        db.ref("chat_v4").limitToLast(10).once("value", snap => { snap.forEach(s => { if(s.val().name !== currentUser) db.ref("chat_v4/"+s.key+"/readBy").child(currentUser).set(true); }); });
        setTimeout(() => { const b = document.getElementById("chat-messages"); b.scrollTop = b.scrollHeight; }, 50);
    }
}

function updateBadge(n) { const b = document.getElementById("chat-badge"); b.innerText = n; b.style.display = n > 0 ? "block" : "none"; }
function openFullImg(s) { document.getElementById("lightbox-img").src = s; document.getElementById("lightbox").style.display = "flex"; }
function showCtx(e, k, a) { e.preventDefault(); if(!isAdmin && a!==currentUser) return; const m = document.getElementById("context-menu"); m.style.display="block"; m.style.left=e.pageX+"px"; m.style.top=e.pageY+"px"; document.getElementById("ctx-delete").onclick=()=>{ if(confirm("Удалить?")) db.ref("chat_v4/"+k).remove(); }; }

function escapeHtml(text) {
    return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function formatChatTimestamp(value) {
    const dt = new Date(value);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);
    const messageDay = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
    let prefix = "";
    if (messageDay.getTime() === today.getTime()) {
        prefix = "";
    } else if (messageDay.getTime() === yesterday.getTime()) {
        prefix = "Вчера ";
    } else {
        prefix = `${String(dt.getDate()).padStart(2, '0')}.${String(dt.getMonth() + 1).padStart(2, '0')} `;
    }
    return prefix + dt.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function escapeJsString(text) {
    return String(text || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\r/g, "\\r")
        .replace(/\n/g, "\\n");
}

function dbKey(value) {
    return encodeURIComponent(String(value || "")).replace(/\./g, "%2E");
}

function dbKeyToValue(key) {
    try {
        return decodeURIComponent(key);
    } catch (err) {
        return key;
    }
}

function getMyIp() {
    return fetch("https://api.ipify.org?format=json")
        .then(res => res.ok ? res.json() : null)
        .then(data => data?.ip || "")
        .catch(() => "");
}

function fetchAndStoreMyIp() {
    return getMyIp().then(ip => {
        currentIp = ip || "";
        if (currentUser && currentIp) {
            db.ref(`users/${currentUser}`).update({ ip: currentIp, lastSeen: Date.now() });
        }
        return currentIp;
    });
}

function refreshAdminData() {
    if (isAdmin) listenAdminUsers();
}

function addNewAdmin() {
    if (!isAdmin) return;
    const name = document.getElementById("adminInp").value.trim();
    if (!name) return;
    if (/[.$#[\]/]/.test(name)) {
        alert("Имя не должно содержать символы . $ # [ ] /");
        return;
    }
    db.ref(`admins/${name}`).set(true)
      .then(() => db.ref(`users/${name}`).update({ admin: true }))
      .then(() => { document.getElementById("adminInp").value = ""; })
      .catch(err => { console.error(err); alert("Не удалось сделать пользователя администратором"); });
}

function removeAdmin(name) {
    if (!isAdmin || !name) return;
    if (!confirm(`Снять права администратора у ${name}?`)) return;
    db.ref(`admins/${name}`).remove()
      .then(() => db.ref(`users/${name}`).update({ admin: false }))
      .catch(err => { console.error(err); alert("Не удалось снять права администратора"); });
}

function renderOnlineUsers() {
    const container = document.getElementById("onlineUsersList");
    if (!container) return;
    const onlineNames = Object.keys(latestPresence || {}).sort();
    if (!onlineNames.length) {
        container.innerHTML = '<div style="color:#aaa">Никого нет в сети</div>';
        return;
    }
    const html = onlineNames.map(name => {
        const user = latestUsers[name] || {};
        const lastSeen = user.lastSeen ? new Date(user.lastSeen) : null;
        const timeLabel = lastSeen ? lastSeen.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '—';
        return `<div style="display:flex; justify-content:space-between; align-items:center; gap:10px; padding:8px 10px; background:rgba(255,255,255,0.05); border-radius:12px;">
                    <span style="font-weight:700;">${escapeHtml(name)}</span>
                    <span style="opacity:.7; font-size:13px;">${timeLabel}</span>
                </div>`;
    }).join("");
    container.innerHTML = html;
}

function listenAdminUsers() {
    db.ref("users").on("value", snap => {
        const users = snap.val() || {};
        latestUsers = users;
        Promise.all([
            db.ref("blocked_ips").once("value"),
            db.ref("admins").once("value"),
            db.ref("muted_users").once("value")
        ]).then(([blockSnap, adminSnap, muteSnap]) => {
            currentBlockedIps = blockSnap.val() || {};
            currentAdmins = adminSnap.val() || {};
            mutedUsers = muteSnap.val() || {};
            renderAdminUsers(users, currentBlockedIps, currentAdmins);
            renderBlockedIps(currentBlockedIps);
        });
        renderOnlineUsers();
    });
    db.ref("blocked_ips").on("value", snap => {
        currentBlockedIps = snap.val() || {};
        renderBlockedIps(currentBlockedIps);
        renderAdminUsers(latestUsers, currentBlockedIps, currentAdmins);
    });
    db.ref("admins").on("value", snap => {
        currentAdmins = snap.val() || {};
        renderAdminUsers(latestUsers, currentBlockedIps, currentAdmins);
    });
    db.ref("muted_users").on("value", snap => {
        mutedUsers = snap.val() || {};
        if (currentUser) {
            isMuted = !!mutedUsers[currentUser];
            renderMuteState();
        }
        renderAdminUsers(latestUsers, currentBlockedIps, currentAdmins);
    });
}

function renderAdminUsers(users, blocked, admins) {
    let html = "";
    Object.keys(users).sort().forEach(name => {
        const user = users[name] || {};
        const ip = user.ip || "";
        const ipKey = ip ? dbKey(ip) : "";
        const isBlocked = ip && blocked[ipKey];
        const isUserAdmin = !!admins[name] || !!user.admin || name.toLowerCase() === "дениска";
        const isUserMuted = !!mutedUsers[name];
        const safeName = escapeHtml(name);
        const safeIp = escapeHtml(ip || "нет");
        const roleLabel = isUserAdmin ? `<span style="font-size:10px; color:#38bdf8; margin-left:6px;">admin</span>` : "";
        const adminActionBtn = isUserAdmin && name.toLowerCase() !== "дениска"
            ? `<button class="glass-btn admin-action-btn" style="background:rgba(255,255,255,0.08);" onclick="removeAdmin('${escapeJsString(name)}')">Снять admin</button>`
            : "";
        const actionBtn = ip
            ? `<button class="glass-btn admin-action-btn" style="${isBlocked ? 'background:#ff3b30;color:#111;' : ''}" onclick="${isBlocked ? `unblockIp('${escapeJsString(ipKey)}')` : `blockIp('${escapeJsString(ipKey)}')`}">${isBlocked ? 'Разблокировать' : 'Заблокировать'}</button>`
            : `<button class="glass-btn admin-action-btn" style="opacity:.5; cursor:not-allowed;" disabled>нет IP</button>`;
        const muteBtn = `<button class="glass-btn admin-action-btn" style="${isUserMuted ? 'background:#ff3b30;color:#111;' : ''}" onclick="toggleMuteUser('${escapeJsString(name)}')">${isUserMuted ? 'Размутить' : 'Мут'}</button>`;
        html += `
            <div class="admin-user-card">
                <div class="user-info">
                    <div style="font-weight:700;">${safeName}${roleLabel}</div>
                    <div class="admin-user-status">IP: ${safeIp}${isUserMuted ? ' · muted' : ''}</div>
                </div>
                <div class="admin-actions">
                    <button class="glass-btn admin-action-btn" onclick="showProfileModal('${escapeJsString(name)}')">Просмотр</button>
                    ${muteBtn}
                    ${actionBtn}
                    ${adminActionBtn}
                    <button class="glass-btn admin-action-btn" style="background: rgba(255,59,48,0.12); color:#ff7f84;" onclick="deleteUser('${escapeJsString(name)}')">Удалить</button>
                </div>
            </div>`;
    });
    document.getElementById("adminUsersList").innerHTML = html || '<div style="color:#aaa">Нет зарегистрированных пользователей</div>';
}

function renderBlockedIps(blocked) {
    let html = "";
    Object.keys(blocked).sort().forEach(ipKey => {
        const item = blocked[ipKey] || {};
        const ip = dbKeyToValue(ipKey);
        const blockedBy = escapeHtml(item.blockedBy || "");
        const blockedAt = item.at ? new Date(item.at).toLocaleString() : "";
        html += `
            <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px; background:rgba(255,255,255,0.05); border-radius:15px;">
                <div>
                    <div style="font-weight:700;">${escapeHtml(ip)}</div>
                    <div style="font-size:12px; color:#aaa;">${blockedBy ? `Заблокировал: ${blockedBy}` : ''}${blockedAt ? ` ${blockedAt}` : ''}</div>
                </div>
                <button class="glass-btn" style="font-size:12px;" onclick="unblockIp('${escapeJsString(ipKey)}')">Разблокировать</button>
            </div>`;
    });
    document.getElementById("blockedIpsList").innerHTML = html || '<div style="color:#aaa">Нет заблокированных IP</div>';
}

function blockIp(ipKey) {
    const ip = dbKeyToValue(ipKey);
    if (!ipKey || !confirm(`Блокировать IP ${ip}?`)) return;
    db.ref(`blocked_ips/${ipKey}`).set({ blockedBy: currentUser, at: Date.now() });
}

function unblockIp(ipKey) {
    const ip = dbKeyToValue(ipKey);
    if (!ipKey || !confirm(`Разблокировать IP ${ip}?`)) return;
    db.ref(`blocked_ips/${ipKey}`).remove();
}

const FUTURE_MONTHS_TO_SYNC = 24;

function getMonthKey(year, month) {
    return `${year}-${month}`;
}

function getFutureMonthKeys(year, month, count = FUTURE_MONTHS_TO_SYNC) {
    const keys = [];
    for (let i = 0; i <= count; i++) {
        const d = new Date(year, month + i, 1);
        keys.push(getMonthKey(d.getFullYear(), d.getMonth()));
    }
    return keys;
}

function removeStaffRowFromUI(name) {
    if (!name || !document.querySelector) return;
    try {
        const selector = `td.name-col[data-name="${CSS.escape(name)}"]`;
        const cell = document.querySelector(selector);
        if (cell && cell.parentNode) {
            cell.parentNode.remove();
        }
    } catch (err) {
        const rows = document.querySelectorAll('td.name-col');
        rows.forEach(cell => {
            if (cell.getAttribute('data-name') === name && cell.parentNode) {
                cell.parentNode.remove();
            }
        });
    }
}

function renderSched() {
    const y = scheduleDate.getFullYear();
    const m = scheduleDate.getMonth();
    const days = new Date(y, m + 1, 0).getDate();
    const weekDays = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
    document.getElementById("monthLabel").innerText = `${(m+1).toString().padStart(2,'0')}.${y}`;

    let h = "<th>Имя</th>";
    for (let i = 1; i <= days; i++) {
        let d = new Date(y, m, i);
        h += `<th class="${(d.getDay()===0||d.getDay()===6)?'weekend':''}">
                <span class="day-name">${weekDays[d.getDay()]}</span>${i}
              </th>`;
    }
    document.getElementById("h-row").innerHTML = h;

    if (currentSchedRef) currentSchedRef.off();
    currentSchedRef = db.ref(`schedule/${y}-${m}/${scheduleMode}`);

    currentSchedRef.on("value", snap => {
        const data = snap.val() || {};
        let html = "";
        Object.keys(data).sort().forEach(n => {
            const row = data[n] || {};
            const safeName = escapeJsString(n);
            html += `<tr>
                <td class="name-col" data-name="${escapeHtml(n)}" onclick="deleteStaff('${safeName}')">${escapeHtml(n)}</td>`;
            for (let i = 1; i <= days; i++) {
                const isWork = row[i] === "10-22";
                html += `<td>
                    <div class="cell-box ${isWork ? 'st-work' : ''}" onclick="toggleWorkCell('${y}-${m}', '${safeName}', ${i}, ${isWork})"></div>
                </td>`;
            }
            html += "</tr>";
        });
        document.getElementById("b-rows").innerHTML = html;
    });
}

function setMode(mode) {
    if (scheduleMode === mode) return;
    scheduleMode = mode;
    document.getElementById("t-day").className = mode === "day" ? "primary" : "glass-btn";
    document.getElementById("t-night").className = mode === "night" ? "primary" : "glass-btn";
    renderSched();
}

function changeMonth(delta) {
    scheduleDate.setMonth(scheduleDate.getMonth() + delta);
    renderSched();
}

function deleteStaff(name) {
    if (!isAdmin) return;
    if (!confirm(`Точно удалить ${name} из графика на этот и последующие месяцы?`)) return;

    const currentY = scheduleDate.getFullYear();
    const currentM = scheduleDate.getMonth();
    const monthKeys = getFutureMonthKeys(currentY, currentM);

    const removals = monthKeys.map(key => db.ref(`schedule/${key}/${scheduleMode}/${name}`).remove());

    Promise.all(removals)
        .then(() => {
            removeStaffRowFromUI(name);
            renderSched();
        })
        .catch(err => {
            console.error("deleteStaff error", err);
            alert("Ошибка при удалении сотрудника");
        });
}

function addNewStaff() {
    if (!isAdmin) return;
    const name = document.getElementById("staffInp").value.trim();
    if (!name) return;
    if (/[.$#[\]/]/.test(name)) {
        alert("Имя не должно содержать символы . $ # [ ] /");
        return;
    }

    const currentY = scheduleDate.getFullYear();
    const currentM = scheduleDate.getMonth();
    const monthKeys = getFutureMonthKeys(currentY, currentM);

    const updates = {};
    monthKeys.forEach(key => {
        updates[`schedule/${key}/${scheduleMode}/${name}/createdAt`] = Date.now();
    });

    db.ref().update(updates)
        .then(() => {
            document.getElementById("staffInp").value = "";
        })
        .catch(err => {
            console.error("addNewStaff error", err);
            alert("Ошибка при добавлении сотрудника");
        });
}

function toggleWorkCell(path, name, day, isWork) {
    if (!isAdmin) return;
    const ref = db.ref(`schedule/${path}/${scheduleMode}/${name}/${day}`);
    if (isWork) {
        ref.remove();
    } else {
        ref.set("10-22");
    }
}

function setupPresence() { const r = db.ref(`presence/${currentUser}`); r.set("online"); r.onDisconnect().remove(); db.ref("presence").on("value", snap => { latestPresence = snap.val() || {}; const m = document.getElementById("presence-mini"); m.innerHTML = ""; Object.keys(latestPresence).forEach(() => m.innerHTML += `<div style="width:6px;height:6px;background:var(--online);border-radius:50%;"></div>`); renderOnlineUsers(); }); }
function uploadAvatar(input) {
    if (input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                avatarEditorImage = img;
                avatarMinScale = Math.max(220 / img.width, 220 / img.height);
                avatarScale = avatarMinScale;
                avatarOffset = { x: 0, y: 0 };
                document.getElementById('avatarEditor').style.display = 'block';
                document.getElementById('profileAvatarPreview').style.opacity = '0.6';
                updateAvatarCanvas();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function showAvatarEditor() {
    document.getElementById('avatarEditor').style.display = 'block';
    document.getElementById('profileAvatarPreview').style.opacity = '0.6';
    updateAvatarCanvas();
}

function cancelAvatarEdit() {
    avatarEditorImage = null;
    document.getElementById('avatarEditor').style.display = 'none';
    document.getElementById('profileAvatarPreview').style.opacity = '1';
}

function saveAvatar() {
    if (!avatarEditorImage) return;
    const canvas = document.getElementById('avatarCanvas');
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    db.ref(`users/${currentUser}/avatar`).set(dataUrl);
    document.getElementById('myAvatar').src = dataUrl;
    document.getElementById('profileAvatarPreview').src = dataUrl;
    cancelAvatarEdit();
}

function updateAvatarCanvas() {
    const canvas = document.getElementById('avatarCanvas');
    if (!canvas || !avatarEditorImage) return;
    const ctx = canvas.getContext('2d');
    const size = canvas.width;
    ctx.clearRect(0, 0, size, size);

    const w = avatarEditorImage.width * avatarScale;
    const h = avatarEditorImage.height * avatarScale;
    const x = size / 2 - w / 2 + avatarOffset.x;
    const y = size / 2 - h / 2 + avatarOffset.y;
    ctx.drawImage(avatarEditorImage, x, y, w, h);

    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(size / 2, size / 2, size / 2 - 2, 0, Math.PI * 2);
    ctx.stroke();
}

function clampAvatarOffset() {
    if (!avatarEditorImage) return;
    const size = 220;
    const w = avatarEditorImage.width * avatarScale;
    const h = avatarEditorImage.height * avatarScale;
    const maxX = Math.max(0, (w - size) / 2);
    const maxY = Math.max(0, (h - size) / 2);
    avatarOffset.x = Math.max(-maxX, Math.min(maxX, avatarOffset.x));
    avatarOffset.y = Math.max(-maxY, Math.min(maxY, avatarOffset.y));
}

function zoomAvatar(delta) {
    if (!avatarEditorImage) return;
    avatarScale = Math.max(avatarMinScale, avatarScale + delta);
    clampAvatarOffset();
    updateAvatarCanvas();
}

function initAvatarEditor() {
    const canvas = document.getElementById('avatarCanvas');
    if (!canvas) return;
    canvas.onpointerdown = e => {
        if (!avatarEditorImage) return;
        avatarDragStart = { x: e.clientX, y: e.clientY, offsetX: avatarOffset.x, offsetY: avatarOffset.y };
        canvas.setPointerCapture(e.pointerId);
    };
    canvas.onpointermove = e => {
        if (!avatarDragStart) return;
        avatarOffset.x = avatarDragStart.offsetX + (e.clientX - avatarDragStart.x);
        avatarOffset.y = avatarDragStart.offsetY + (e.clientY - avatarDragStart.y);
        clampAvatarOffset();
        updateAvatarCanvas();
    };
    canvas.onpointerup = canvas.onpointercancel = () => {
        avatarDragStart = null;
    };
}

initAvatarEditor();

function logout() { localStorage.clear(); location.reload(); }
