<!DOCTYPE html> 
<html lang="ru"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
<title>porogi</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script> 
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script> 

<style> 
:root { 
  --accent: #a855f7; --success: #22c55e; --bg: #000; 
  --glass: rgba(30, 30, 30, 0.8); --border: rgba(255, 255, 255, 0.1); --online: #22c55e;
} 

body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: var(--bg); color: white; -webkit-font-smoothing: antialiased; overflow-x: hidden; } 
body::before { content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at center, #1a1033 0%, #000 70%); z-index: -1; } 

#app { display: none; padding: 15px; max-width: 900px; margin: auto; } 
button { border: none; border-radius: 14px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; position: relative; } 
.primary { background: var(--accent); color: white; } 
.glass-btn { background: var(--glass); border: 1px solid var(--border); color: #fff; } 
.success-btn { background: var(--success); color: white; }
.danger { background: rgba(255, 59, 48, 0.15); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.2); } 

.badge { position: absolute; top: -5px; right: -5px; background: #ff3b30; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; display: none; border: 2px solid var(--bg); font-weight: 800; z-index: 10; }
.card { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 24px; margin-bottom: 15px; position: relative; } 
.count { font-size: 44px; font-weight: 800; cursor: pointer; color: #fff; } 
.avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #333; border: 2px solid var(--border); }
.nav-profile { display: flex; align-items: center; gap: 10px; }

/* ГРАФИК */
.schedule-wrap { width: 100%; overflow-x: auto; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid var(--border); margin-top: 10px; }
table { border-collapse: collapse; width: 100%; font-size: 10px; }
th, td { border: 1px solid #222; padding: 6px 2px; text-align: center; min-width: 38px; height: 40px; }
.day-name { font-size: 8px; opacity: 0.6; text-transform: uppercase; display: block; }
.weekend { color: #ff3b30; background: rgba(255,0,0,0.05); }
.name-col { text-align: left; min-width: 130px; position: sticky; left: 0; background: #0a0a0a; z-index: 5; padding: 10px; font-weight: 600; cursor: pointer; }
.cell-box { width: 30px; height: 30px; margin: auto; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
.st-work { background: var(--accent); box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); }

/* ЧАТ */
#view-chat { display: none; flex-direction: column; height: 85vh; }
#chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
.msg-wrapper { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; margin-bottom: 4px; }
.me-wrapper { align-self: flex-end; flex-direction: row-reverse; }
.msg { padding: 10px 14px; border-radius: 18px; font-size: 14px; position: relative; min-width: 60px; }
.me { background: var(--accent); border-bottom-right-radius: 4px; }
.others { background: #222; border-bottom-left-radius: 4px; }
.msg-info { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 4px; font-size: 10px; opacity: 0.7; }
.ticks { font-size: 12px; margin-left: 2px; }
.ticks.read { color: #38bdf8; }

#preview-area { display: none; padding: 10px; background: #1a1a1a; border-radius: 15px; margin-bottom: 10px; }
.preview-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; padding: 20px; }
.modal-content { background: #111; border: 1px solid var(--border); padding: 30px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px; }

#context-menu { display: none; position: fixed; background: #222; border: 1px solid #444; border-radius: 12px; z-index: 3000; overflow: hidden; }
#context-menu div { padding: 12px 20px; font-size: 14px; cursor: pointer; }

/* Версия сайта */
.version-tag { position: fixed; bottom: 5px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.3); z-index: 9999; pointer-events: none; font-weight: 600; }
</style> 
</head> 

<body> 
<div class="version-tag">test v 1.05</div>

<div id="context-menu"><div style="color:#ff3b30;" id="ctx-delete">Удалить</div></div>

<div id="reportModal" class="modal-overlay">
    <div class="modal-content">
        <img src="https://media.tenor.com/716m2S_T-94AAAAM/shrek-dance.gif" style="width: 150px; border-radius: 20px; margin-bottom: 15px;">
        <h2 style="margin:0;">СМЕНА ЗАКРЫТА!(</h2>
        <div id="reportDetails" style="margin: 20px 0; font-size: 16px; line-height: 1.6; text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;"></div>
        <button class="primary" style="width:100%" onclick="document.getElementById('reportModal').style.display='none'">КРАСАВА</button>
    </div>
</div>

<div id="lightbox" class="modal-overlay" onclick="this.style.display='none'"><img id="lightbox-img" style="max-width:95%; max-height:95%"></div>

<div id="login" style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:15px; padding: 20px;"> 
  <h1>porogi</h1> 
  <input id="nameInput" placeholder="Ваше имя" style="padding:15px; border-radius:15px; border:none; width: 220px; background:#111; color:#fff;"
       onkeydown="if(event.key==='Enter'){ event.preventDefault(); login(); }">
<input type="password" id="codeInput" placeholder="Код" style="padding:15px; border-radius:15px; border:none; width:220px; text-align:center; background:#111; color:#fff;"
       onkeydown="if(event.key==='Enter'){ event.preventDefault(); login(); }">
  <button class="primary" style="width:220px" onclick="login()">Войти</button> 
</div> 

<div id="app"> 
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;"> 
    <div class="nav-profile">
        <img id="myAvatar" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        <div><div id="userTag" style="font-weight:800;"></div><div id="presence-mini" style="display:flex; gap:3px;"></div></div>
    </div>
    <div style="display:flex; gap:5px;">
        <button id="btn-main" class="primary" onclick="switchTab('main')">Смена</button>
        <button id="btn-sched" class="glass-btn" onclick="switchTab('sched')">График</button>
        <button id="btn-chat" class="glass-btn" onclick="switchTab('chat')">Чат <div id="chat-badge" class="badge">0</div></button> 
        <button class="glass-btn" onclick="switchTab('settings')">⚙️</button>
    </div>
  </div> 

  <div id="view-main">
    <div id="startBtnCont"><button class="primary" style="width: 100%; padding: 25px; font-size: 18px;" onclick="startShift()">КРУТИТЬ ПОРОГИ</button></div> 
    
    <div id="work" style="display:none;"> 
      
      <div id="active-shift-info" style="margin-bottom: 15px; padding: 15px; background: var(--glass); border-radius: 15px; border: 1px solid var(--border); font-size: 14px;">
          <div id="shift-participants"></div>
      </div>

      <div class="card"><h4 style="margin:0; color:#888;">СДЭК</h4>
        <div style="display:flex; gap:15px; align-items: center;">
            <button class="success-btn ctrl-btn" style="flex:1; font-size:24px;" onclick="addCounter('cdek')">+</button>
            <div class="count" id="cdek_val" onclick="manualInput('cdek')">0</div>
            <button class="danger ctrl-btn" style="padding:10px 20px;" onclick="removeCounter('cdek')">−</button>
        </div>
      </div> 
      <div class="card"><h4 style="margin:0; color:#888;">ВБ / ОЗОН / ДОСТ</h4>
        <div style="display:flex; gap:15px; align-items: center;">
            <button class="success-btn ctrl-btn" style="flex:1; font-size:24px;" onclick="addCounter('wb')">+</button>
            <div class="count" id="wb_val" onclick="manualInput('wb')">0</div>
            <button class="danger ctrl-btn" style="padding:10px 20px;" onclick="removeCounter('wb')">−</button>
        </div>
      </div> 
      <div class="card"><h4 style="margin:0; color:#888;">ОПТОВЫЕ ЗАКАЗЫ</h4>
        <div style="display:flex; gap:15px; align-items: center;">
            <button class="success-btn ctrl-btn" style="flex:1; font-size:24px;" onclick="addCounter('opt')">+</button>
            <div class="count" id="opt_val" onclick="manualInput('opt')">0</div>
            <button class="danger ctrl-btn" style="padding:10px 20px;" onclick="removeCounter('opt')">−</button>
        </div>
      </div>
      <div style="text-align:center; margin:20px 0;">
          <div style="font-size:48px; font-weight:900;" id="total">0</div>
          <div style="font-size:14px; color:#aaa; margin-top:4px;" id="optDisplay">Оптовые: 0</div>
          <div id="salaryDisplay" style="color:var(--accent); font-weight:800;">Итого: 0₽</div>
      </div> 
      
      <button id="joinShiftBtn" class="success-btn" style="width:100%; padding:20px; display:none;" onclick="joinShift()">ПРИСОЕДИНИТЬСЯ К СМЕНЕ</button>
      <button id="leaveShiftBtn" class="danger" style="width:100%; padding:20px; display:none;" onclick="leaveShift()">УЙТИ СО СМЕНЫ</button> 
    </div> 
    <button class="glass-btn" style="width:100%; margin-top:10px;" onclick="toggleHistory()">Архив смен</button>
    <div id="history" style="display:none; margin-top:10px;"></div>
  </div>

  <div id="view-sched" style="display:none;">
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button id="t-day" class="primary" style="flex:1" onclick="setMode('day')">ДЕНЬ</button>
        <button id="t-night" class="glass-btn" style="flex:1" onclick="setMode('night')">НОЧЬ</button>
    </div>
    <div style="display:flex; justify-content: center; gap:15px; align-items: center; margin-bottom:10px;">
        <button class="glass-btn" onclick="changeMonth(-1)">←</button><span id="monthLabel" style="font-weight:700;"></span><button class="glass-btn" onclick="changeMonth(1)">→</button>
    </div>
    <div id="adminPanel" style="display:none; gap:5px; margin-bottom:10px;">
        <input id="staffInp" placeholder="Имя" style="flex:1; padding:12px; border-radius:12px; background:#111; border:none; color:#fff;"
           onkeydown="if(event.key==='Enter'){ event.preventDefault(); addNewStaff(); }">
        <button class="success-btn" onclick="addNewStaff()">+</button>
    </div>
    <div class="schedule-wrap"><table><thead><tr id="h-row"></tr></thead><tbody id="b-rows"></tbody></table></div>
  </div>

  <div id="view-chat" style="display:none;">
    <div id="chat-messages"></div>
    <div id="preview-area">
        <div id="preview-imgs" style="display:flex; gap:5px; margin-bottom:10px; overflow-x:auto;"></div>
        <input type="text" id="photoCaption" placeholder="Подпись к фото..." style="width:100%; background:#222; border:none; color:white; padding:10px; border-radius:10px; outline:none;">
    </div>
    <div style="background:#111; padding:10px; border-radius:24px; display:flex; gap:10px; align-items:center;">
        <button class="glass-btn" style="width:40px; height:40px; border-radius:50%;" onclick="document.getElementById('fileInp').click()">+</button>
        <input type="file" id="fileInp" style="display:none" accept="image/*" multiple onchange="preparePhotos(this)">
       <textarea id="chatMsg" placeholder="Сообщение..." style="flex:1; background:transparent; border:none; color:white; outline:none; resize:none; min-height:38px; line-height:1.4;"
          rows="2" onkeydown="handleChatKey(event)"></textarea>
        <button class="primary" onclick="sendChat()">↑</button>
    </div>
  </div>

  <div id="view-settings" style="display:none;">
    <div class="card"><center>
      <img id="setAvatarPreview" class="avatar" style="width:100px; height:100px; margin-bottom:15px;">
      <button class="glass-btn" onclick="document.getElementById('avatarInp').click()">Изменить фото</button>
      <input type="file" id="avatarInp" style="display:none" accept="image/*" onchange="uploadAvatar(this)">
      <button class="danger" style="width:100%; margin-top:20px;" onclick="logout()">Выйти</button>
    </center></div>
    <div id="adminUsersPanel" style="display:none; margin-top:20px; gap:15px;">
      <div class="card" style="padding:15px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <div>
            <div style="font-size:16px; font-weight:800;">Админ-панель</div>
            <div style="font-size:12px; color:#aaa;">Управление пользователями и IP</div>
          </div>
          <button class="glass-btn" onclick="refreshAdminData()" style="font-size:12px; padding:8px 12px;">Обновить</button>
        </div>
        <div id="adminUsersList" style="display:flex; flex-direction:column; gap:10px;"></div>
      </div>
      <div class="card" style="padding:15px;">
        <div style="font-size:16px; font-weight:800; margin-bottom:10px;">Заблокированные IP</div>
        <div id="blockedIpsList" style="display:flex; flex-direction:column; gap:10px;"></div>
      </div>
    </div>
  </div>
</div> 

<script> 
const firebaseConfig = { apiKey: "AIzaSyA41nDX13dsMuPNJkckCMQz8bfim3Hscxs", authDomain: "porog-lol.firebaseapp.com", databaseURL: "https://porog-lol-default-rtdb.europe-west1.firebasedatabase.app", projectId: "porog-lol" }; 
firebase.initializeApp(firebaseConfig); const db = firebase.database(); 

// --- ПЕРЕМЕННЫЕ (добавлены нужные для исправления графика и статуса) ---
let currentUser = localStorage.getItem("userName") || ""; 
let isAdmin = false, scheduleDate = new Date(), scheduleMode = 'day', userAvatars = {}, chatInitialized = false; 
let lastChatViewTime = localStorage.getItem("lastChatView") || 0;
let currentTab = 'main', pendingPhotos = [];
let currentSchedRef = null; 
let isGlobalParticipant = false; 
let currentIp = "";

if(currentUser) showApp(); 

function login() { 
  const n = document.getElementById("nameInput").value.trim(); 
  if (!n) return; 
  if (/[.$#[\]/]/.test(n)) { alert("Имя не должно содержать символы . $ # [ ] /"); return; } 
  if (document.getElementById("codeInput").value !== "67") return; 

  getMyIp().then(ip => {
      if (!ip) { alert("Не удалось определить IP. Попробуйте снова."); return; }
      const ipKey = dbKey(ip);
      db.ref(`blocked_ips/${ipKey}`).once("value").then(snap => {
          if (snap.exists() && n.toLowerCase() !== "дениска") {
              alert("Ваш IP заблокирован. Обратитесь к администратору.");
              return;
          }
          localStorage.setItem("userName", n);
          localStorage.setItem("userIp", ip);
          db.ref(`users/${n}`).update({ ip, lastSeen: Date.now() });
          location.reload();
      });
  });
} 

function showApp() { 
  isAdmin = (currentUser.toLowerCase() === "дениска"); 
  document.getElementById("login").style.display = "none"; 
  document.getElementById("app").style.display = "block"; 
  document.getElementById("userTag").innerText = isAdmin ? "💀 Дениска" : "@" + currentUser.toLowerCase(); 
  if(isAdmin) document.getElementById("adminPanel").style.display = "flex"; 
  
  db.ref("users").on("value", snap => {
      userAvatars = snap.val() || {};
      const myAv = userAvatars[currentUser]?.avatar || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
      document.getElementById("myAvatar").src = myAv;
      document.getElementById("setAvatarPreview").src = myAv;
  });

  setupPresence(); listenChat(); renderSched(); listenHistory(); listenActiveShift();
  if (isAdmin) { document.getElementById("adminUsersPanel").style.display = "block"; listenAdminUsers(); }
  fetchAndStoreMyIp();
  window.onclick = () => document.getElementById("context-menu").style.display = "none";
} 

// --- РАБОТА СО СМЕНОЙ ---
function listenActiveShift() {
    db.ref("active_shift").on("value", snap => {
        const shift = snap.val();
        const workDiv = document.getElementById("work");
        const startBtnCont = document.getElementById("startBtnCont");
        const joinBtn = document.getElementById("joinShiftBtn");
        const leaveBtn = document.getElementById("leaveShiftBtn");
        const ctrls = document.querySelectorAll(".ctrl-btn");
        const cdekVal = document.getElementById("cdek_val");
        const wbVal = document.getElementById("wb_val");
        const optVal = document.getElementById("opt_val");

        if(shift) {
            // Локальное сохранение данных (бэкап смены)
            localStorage.setItem("active_shift_backup", JSON.stringify(shift));

            startBtnCont.style.display = "none";
            workDiv.style.display = "block";

            cdekVal.innerText = shift.cdek || 0;
            wbVal.innerText = shift.wb || 0;
            optVal.innerText = shift.opt || 0;
            document.getElementById("total").innerText = (shift.cdek || 0) + (shift.wb || 0);
            document.getElementById("optDisplay").innerText = `Оптовые: ${shift.opt || 0}`;

            const parts = shift.participants || {};
            isGlobalParticipant = parts[currentUser] !== undefined;

            let partsText = "<b style='color:var(--accent);'>🟢 Смена в эфире:</b><br><br>";
            Object.keys(parts).forEach(p => {
                partsText += `• ${p} <span style="float:right; opacity:0.8;">${(parts[p].earned || 0).toFixed(0)}₽</span><br>`;
            });
            document.getElementById("shift-participants").innerHTML = partsText;

            if(isGlobalParticipant) {
                // Если мы работаем
                ctrls.forEach(b => b.style.display = "flex");
                joinBtn.style.display = "none";
                leaveBtn.style.display = "flex";
                cdekVal.style.pointerEvents = "auto";
                wbVal.style.pointerEvents = "auto";
                optVal.style.pointerEvents = "auto";
                document.getElementById("salaryDisplay").innerText = `Моя доля: ${(parts[currentUser].earned || 0).toFixed(0)}₽`;
            } else {
                // Режим куколда
                ctrls.forEach(b => b.style.display = "none");
                joinBtn.style.display = "flex";
                leaveBtn.style.display = "none";
                cdekVal.style.pointerEvents = "none";
                wbVal.style.pointerEvents = "none";
                optVal.style.pointerEvents = "none";
                document.getElementById("salaryDisplay").innerText = "Режим куколда 👀";
            }
        } else {
            // Смена закрыта
            startBtnCont.style.display = "block";
            workDiv.style.display = "none";
            isGlobalParticipant = false;
        }
    });
}

function startShift() { 
    db.ref("active_shift").set({
        startTime: Date.now(),
        cdek: 0, wb: 0, opt: 0,
        participants: { [currentUser]: { earned: 0, joinedAt: Date.now() } }
    });
}

function joinShift() {
    db.ref("active_shift/participants/" + currentUser).set({ earned: 0, joinedAt: Date.now() });
}

function getOrderShare(type) {
    return type === 'opt' ? 50 : 80;
}

function addCounter(type) { 
    db.ref("active_shift").transaction(shift => {
        if (!shift || !shift.participants || !shift.participants[currentUser]) {
            return; 
        }
        shift[type] = (shift[type] || 0) + 1;
        const parts = Object.keys(shift.participants);
        const share = getOrderShare(type) / parts.length;
        parts.forEach(p => { shift.participants[p].earned = (shift.participants[p].earned || 0) + share; });
        return shift;
    });
}

function removeCounter(type) { 
    db.ref("active_shift").transaction(shift => {
        if (!shift || !shift.participants || !shift.participants[currentUser] || !shift[type] || shift[type] <= 0) {
            return; 
        }
        shift[type]--;
        const parts = Object.keys(shift.participants);
        const share = getOrderShare(type) / parts.length;
        parts.forEach(p => { shift.participants[p].earned = Math.max(0, (shift.participants[p].earned || 0) - share); });
        return shift;
    });
}

function manualInput(type) { 
    if (!isGlobalParticipant) return; // Куколд не может кликать и менять цифры

    db.ref("active_shift").once("value", snap => {
        const shift = snap.val();
        if(!shift || !shift.participants || !shift.participants[currentUser]) return;
        let currentVal = shift[type] || 0;
        let v = prompt("Введи новое количество заказов:", currentVal);
        if(v && !isNaN(v)) {
            let newVal = parseInt(v);
            let diff = newVal - currentVal;
            if(diff !== 0) {
                db.ref("active_shift").transaction(s => {
                    if (!s || !s.participants || !s.participants[currentUser]) return;
                    s[type] = newVal;
                    const parts = Object.keys(s.participants);
                    const share = (diff * getOrderShare(type)) / parts.length;
                    parts.forEach(p => { s.participants[p].earned = Math.max(0, (s.participants[p].earned || 0) + share); });
                    return s;
                });
            }
        }
    });
}

function leaveShift() {
    db.ref("active_shift").once("value", snap => {
        const shift = snap.val();
        if(!shift || !shift.participants || !shift.participants[currentUser]) return;

        const myEarned = shift.participants[currentUser].earned || 0;
        const cdekCount = shift.cdek || 0;
        const wbCount = shift.wb || 0;
        const optCount = shift.opt || 0;
        const totalCount = cdekCount + wbCount;
        const startT = new Date(shift.startTime || Date.now());
        const endT = new Date();

        const reportText = `
            <b>Вы вышли со смены!</b><br><br>
            Общая статистика смены:<br>
            Заказы: ${totalCount} | Оптовые: ${optCount}<br><br>
            <span style="color:var(--accent); font-weight:800; font-size:22px;">Твоя доля: ${myEarned.toFixed(0)}₽</span><br><br>
            <span style="font-size:12px; color:#888;">${startT.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${endT.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
        `;
        document.getElementById("reportDetails").innerHTML = reportText;
        document.getElementById("reportModal").style.display = "flex";

        db.ref("shifts").push({
            name: currentUser,
            date: startT.toLocaleDateString(),
            total: totalCount,
            cdek: cdekCount,
            wb: wbCount,
            opt: optCount,
            salary: parseFloat(myEarned.toFixed(2)),
            start: startT.toLocaleString(),
            end: endT.toLocaleString()
        });

        if (Object.keys(shift.participants).length <= 1) {
            db.ref("active_shift").remove(); 
        } else {
            db.ref("active_shift/participants/" + currentUser).remove(); 
        }
    });
}

// --- ЧАТ ---
function listenChat() { 
    const box = document.getElementById("chat-messages"); 
    db.ref("chat_v4").limitToLast(30).on("value", snap => {
        box.innerHTML = ""; let unread = 0;
        snap.forEach(s => {
            const m = s.val();
            if (m.time > lastChatViewTime && m.name !== currentUser) unread++;
            appendMsgUI(s.key, m, false);
        });
        if(currentTab !== 'chat') updateBadge(unread);
        if(!chatInitialized) { box.scrollTop = box.scrollHeight; chatInitialized = true; }
        if(currentTab === 'chat') db.ref("chat_v4").limitToLast(1).once("child_added", s => { if(s.val().name !== currentUser) db.ref("chat_v4/"+s.key+"/readBy").child(currentUser).set(true); });
    });
}

function appendMsgUI(key, m, scroll) {
    const box = document.getElementById("chat-messages");
    const isMe = m.name === currentUser;
    const wrapper = document.createElement("div");
    wrapper.className = `msg-wrapper ${isMe ? "me-wrapper" : ""}`;
    wrapper.dataset.key = key;

    const av = userAvatars[m.name]?.avatar || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    const time = new Date(m.time).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    let ticks = "✓";
    if (m.readBy && Object.keys(m.readBy).length > 0) ticks = "✓✓";
    const tickClass = ticks === "✓✓" ? "read" : "";

    const avatarImg = document.createElement("img");
    avatarImg.className = "avatar";
    avatarImg.style.width = "28px";
    avatarImg.style.height = "28px";
    avatarImg.src = av;
    wrapper.appendChild(avatarImg);

    const msg = document.createElement("div");
    msg.className = `msg ${isMe ? "me" : "others"}`;

    const isSenderAdmin = String(m.name).toLowerCase() === "дениска";
    const userLabel = document.createElement("small");
    userLabel.style.cssText = "font-size:10px; font-weight:700; opacity:0.8; display:flex; align-items:center; gap:6px;";
    userLabel.textContent = m.name;
    if (isSenderAdmin) {
        const adminTag = document.createElement("span");
        adminTag.style.cssText = "font-size:9px; color:#aaa; text-transform:uppercase; letter-spacing:0.05em;";
        adminTag.textContent = "admin";
        userLabel.appendChild(adminTag);
    }
    msg.appendChild(userLabel);

    if (m.images && Array.isArray(m.images)) {
        const gallery = document.createElement("div");
        gallery.style.cssText = "display:grid; grid-template-columns:repeat(auto-fit,minmax(80px,1fr)); gap:4px; margin:5px 0;";
        m.images.forEach(src => {
            const img = document.createElement("img");
            img.src = src;
            img.style.cssText = "width:100%; border-radius:10px; cursor:pointer;";
            img.addEventListener("click", () => openFullImg(src));
            gallery.appendChild(img);
        });
        msg.appendChild(gallery);
    }

    const textEl = document.createElement("div");
    textEl.textContent = m.text || "";
    msg.appendChild(textEl);

    const info = document.createElement("div");
    info.className = "msg-info";
    const timeSpan = document.createElement("span");
    timeSpan.textContent = time;
    info.appendChild(timeSpan);
    if (isMe) {
        const tickSpan = document.createElement("span");
        tickSpan.className = `ticks ${tickClass}`;
        tickSpan.textContent = ticks;
        info.appendChild(tickSpan);
    }
    msg.appendChild(info);

    msg.addEventListener("contextmenu", e => showCtx(e, key, m.name));
    wrapper.appendChild(msg);
    box.appendChild(wrapper);

    if (scroll) box.scrollTo({ top: box.scrollHeight, behavior: "smooth" });
}


async function preparePhotos(input) {
    const files = Array.from(input.files).slice(0, 10);
    if(!files.length) return;
    pendingPhotos = [];
    const previewBox = document.getElementById("preview-imgs");
    previewBox.innerHTML = "";
    document.getElementById("preview-area").style.display = "block";
    for (let f of files) {
        const b = await new Promise(res => {
            const r = new FileReader(); r.onload = e => {
                const img = new Image(); img.onload = () => {
                    const c = document.createElement('canvas'); const max = 800; let w=img.width, h=img.height;
                    if(w>h && w>max) { h*=max/w; w=max; } else if(h>max) { w*=max/h; h=max; }
                    c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); res(c.toDataURL('image/jpeg', 0.7));
                }; img.src = e.target.result;
            }; r.readAsDataURL(f);
        });
        pendingPhotos.push(b); previewBox.innerHTML += `<img src="${b}" class="preview-img">`;
    }
}

function sendChat() {
    const msgInput = document.getElementById("chatMsg"), capInput = document.getElementById("photoCaption");
    const text = pendingPhotos.length > 0 ? capInput.value.trim() : msgInput.value.trim();
    if(!text && !pendingPhotos.length) return;
    db.ref("chat_v4").push({ name: currentUser, text: text, images: pendingPhotos.length>0?pendingPhotos:null, time: Date.now() });
    msgInput.value = ""; capInput.value = ""; pendingPhotos = []; document.getElementById("preview-area").style.display = "none";
}

function handleChatKey(event) {
    if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendChat();
    }
}

function switchTab(t) {
    currentTab = t;
    ["view-main", "view-sched", "view-chat", "view-settings"].forEach(v => document.getElementById(v).style.display = "none");
    ["btn-main", "btn-sched", "btn-chat"].forEach(b => document.getElementById(b).className = "glass-btn");
    if(document.getElementById("btn-"+t)) document.getElementById("btn-"+t).className = "primary";
    document.getElementById("view-"+t).style.display = t==='chat'?'flex':'block';
    if(t==='chat') { 
        lastChatViewTime = Date.now(); localStorage.setItem("lastChatView", lastChatViewTime);
        updateBadge(0);
        db.ref("chat_v4").limitToLast(10).once("value", snap => { snap.forEach(s => { if(s.val().name !== currentUser) db.ref("chat_v4/"+s.key+"/readBy").child(currentUser).set(true); }); });
        setTimeout(() => { const b = document.getElementById("chat-messages"); b.scrollTop = b.scrollHeight; }, 50);
    }
}

function updateBadge(n) { const b = document.getElementById("chat-badge"); b.innerText = n; b.style.display = n > 0 ? "block" : "none"; }
function openFullImg(s) { document.getElementById("lightbox-img").src = s; document.getElementById("lightbox").style.display = "flex"; }
function showCtx(e, k, a) { e.preventDefault(); if(!isAdmin && a!==currentUser) return; const m = document.getElementById("context-menu"); m.style.display="block"; m.style.left=e.pageX+"px"; m.style.top=e.pageY+"px"; document.getElementById("ctx-delete").onclick=()=>{ if(confirm("Удалить?")) db.ref("chat_v4/"+k).remove(); }; }

// renderSched() вставляет name в inline onclick="..." без экранирования. Если имя содержит апостроф или кавычки, график перестанет работать.
//appendMsgUI() делает innerHTML с m.text и m.name без защиты — это риск XSS.

function escapeHtml(text) {
    return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function escapeJsString(text) {
    return String(text || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\r/g, "\\r")
        .replace(/\n/g, "\\n");
}

function dbKey(value) {
    return encodeURIComponent(String(value || "")).replace(/\./g, "%2E");
}

function dbKeyToValue(key) {
    try {
        return decodeURIComponent(key);
    } catch (err) {
        return key;
    }
}

function getMyIp() {
    return fetch("https://api.ipify.org?format=json")
        .then(res => res.ok ? res.json() : null)
        .then(data => data?.ip || "")
        .catch(() => "");
}

function fetchAndStoreMyIp() {
    return getMyIp().then(ip => {
        currentIp = ip || "";
        if (currentUser && currentIp) {
            db.ref(`users/${currentUser}`).update({ ip: currentIp, lastSeen: Date.now() });
        }
        return currentIp;
    });
}

function refreshAdminData() {
    if (isAdmin) listenAdminUsers();
}

function listenAdminUsers() {
    db.ref("users").on("value", snap => {
        const users = snap.val() || {};
        db.ref("blocked_ips").once("value").then(blockSnap => {
            renderAdminUsers(users, blockSnap.val() || {});
        });
    });
    db.ref("blocked_ips").on("value", snap => {
        renderBlockedIps(snap.val() || {});
    });
}

function renderAdminUsers(users, blocked) {
    let html = "";
    Object.keys(users).sort().forEach(name => {
        const user = users[name] || {};
        const ip = user.ip || "";
        const ipKey = ip ? dbKey(ip) : "";
        const isBlocked = ip && blocked[ipKey];
        const safeName = escapeHtml(name);
        const safeIp = escapeHtml(ip || "нет");
        const actionBtn = ip
            ? `<button class="glass-btn" style="font-size:12px; ${isBlocked ? 'background:#ff3b30;color:#111;' : ''}" onclick="${isBlocked ? `unblockIp('${escapeJsString(ipKey)}')` : `blockIp('${escapeJsString(ipKey)}')`}">${isBlocked ? 'Разблокировать' : 'Заблокировать'}</button>`
            : `<button class="glass-btn" style="font-size:12px; opacity:.5; cursor:not-allowed;" disabled>нет IP</button>`;

        html += `
            <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px; background:rgba(255,255,255,0.05); border-radius:15px;">
                <div>
                    <div style="font-weight:700;">${safeName}</div>
                    <div style="font-size:12px; color:#aaa;">IP: ${safeIp}</div>
                </div>
                <div>${actionBtn}</div>
            </div>`;
    });
    document.getElementById("adminUsersList").innerHTML = html || '<div style="color:#aaa">Нет зарегистрированных пользователей</div>';
}

function renderBlockedIps(blocked) {
    let html = "";
    Object.keys(blocked).sort().forEach(ipKey => {
        const item = blocked[ipKey] || {};
        const ip = dbKeyToValue(ipKey);
        const blockedBy = escapeHtml(item.blockedBy || "");
        const blockedAt = item.at ? new Date(item.at).toLocaleString() : "";
        html += `
            <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px; background:rgba(255,255,255,0.05); border-radius:15px;">
                <div>
                    <div style="font-weight:700;">${escapeHtml(ip)}</div>
                    <div style="font-size:12px; color:#aaa;">${blockedBy ? `Заблокировал: ${blockedBy}` : ''}${blockedAt ? ` ${blockedAt}` : ''}</div>
                </div>
                <button class="glass-btn" style="font-size:12px;" onclick="unblockIp('${escapeJsString(ipKey)}')">Разблокировать</button>
            </div>`;
    });
    document.getElementById("blockedIpsList").innerHTML = html || '<div style="color:#aaa">Нет заблокированных IP</div>';
}

function blockIp(ipKey) {
    const ip = dbKeyToValue(ipKey);
    if (!ipKey || !confirm(`Блокировать IP ${ip}?`)) return;
    db.ref(`blocked_ips/${ipKey}`).set({ blockedBy: currentUser, at: Date.now() });
}

function unblockIp(ipKey) {
    const ip = dbKeyToValue(ipKey);
    if (!ipKey || !confirm(`Разблокировать IP ${ip}?`)) return;
    db.ref(`blocked_ips/${ipKey}`).remove();
}

const FUTURE_MONTHS_TO_SYNC = 24;

function getMonthKey(year, month) {
    return `${year}-${month}`;
}

function getFutureMonthKeys(year, month, count = FUTURE_MONTHS_TO_SYNC) {
    const keys = [];
    for (let i = 0; i <= count; i++) {
        const d = new Date(year, month + i, 1);
        keys.push(getMonthKey(d.getFullYear(), d.getMonth()));
    }
    return keys;
}

function removeStaffRowFromUI(name) {
    if (!name || !document.querySelector) return;
    try {
        const selector = `td.name-col[data-name="${CSS.escape(name)}"]`;
        const cell = document.querySelector(selector);
        if (cell && cell.parentNode) {
            cell.parentNode.remove();
        }
    } catch (err) {
        // CSS.escape может отсутствовать в старых браузерах
        const rows = document.querySelectorAll('td.name-col');
        rows.forEach(cell => {
            if (cell.getAttribute('data-name') === name && cell.parentNode) {
                cell.parentNode.remove();
            }
        });
    }
}

// --- ГРАФИК ---
function renderSched() {
    const y = scheduleDate.getFullYear();
    const m = scheduleDate.getMonth();
    const days = new Date(y, m + 1, 0).getDate();
    const weekDays = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
    document.getElementById("monthLabel").innerText = `${(m+1).toString().padStart(2,'0')}.${y}`;

    let h = "<th>Имя</th>";
    for (let i = 1; i <= days; i++) {
        let d = new Date(y, m, i);
        h += `<th class="${(d.getDay()===0||d.getDay()===6)?'weekend':''}">
                <span class="day-name">${weekDays[d.getDay()]}</span>${i}
              </th>`;
    }
    document.getElementById("h-row").innerHTML = h;

    if (currentSchedRef) currentSchedRef.off();
    currentSchedRef = db.ref(`schedule/${y}-${m}/${scheduleMode}`);

    currentSchedRef.on("value", snap => {
        const data = snap.val() || {};
        let html = "";
        Object.keys(data).sort().forEach(n => {
            const row = data[n] || {};
            const safeName = escapeJsString(n);
            html += `<tr>
                <td class="name-col" data-name="${escapeHtml(n)}" onclick="deleteStaff('${safeName}')">${escapeHtml(n)}</td>`;
            for (let i = 1; i <= days; i++) {
                const isWork = row[i] === "10-22";
                html += `<td>
                    <div class="cell-box ${isWork ? 'st-work' : ''}" onclick="toggleWorkCell('${y}-${m}', '${safeName}', ${i}, ${isWork})"></div>
                </td>`;
            }
            html += "</tr>";
        });
        document.getElementById("b-rows").innerHTML = html;
    });
}

function setMode(mode) {
    if (scheduleMode === mode) return;
    scheduleMode = mode;
    document.getElementById("t-day").className = mode === "day" ? "primary" : "glass-btn";
    document.getElementById("t-night").className = mode === "night" ? "primary" : "glass-btn";
    renderSched();
}

function changeMonth(delta) {
    scheduleDate.setMonth(scheduleDate.getMonth() + delta);
    renderSched();
}

function deleteStaff(name) {
    if (!isAdmin) return;
    if (!confirm(`Точно удалить ${name} из графика на этот и последующие месяцы?`)) return;

    const currentY = scheduleDate.getFullYear();
    const currentM = scheduleDate.getMonth();
    const monthKeys = getFutureMonthKeys(currentY, currentM);

    const removals = monthKeys.map(key => db.ref(`schedule/${key}/${scheduleMode}/${name}`).remove());

    Promise.all(removals)
        .then(() => {
            removeStaffRowFromUI(name);
            renderSched();
        })
        .catch(err => {
            console.error("deleteStaff error", err);
            alert("Ошибка при удалении сотрудника");
        });
}

function addNewStaff() {
    if (!isAdmin) return;
    const name = document.getElementById("staffInp").value.trim();
    if (!name) return;
    if (/[.$#[\]/]/.test(name)) {
        alert("Имя не должно содержать символы . $ # [ ] /");
        return;
    }

    const currentY = scheduleDate.getFullYear();
    const currentM = scheduleDate.getMonth();
    const monthKeys = getFutureMonthKeys(currentY, currentM);

    const updates = {};
    monthKeys.forEach(key => {
        updates[`schedule/${key}/${scheduleMode}/${name}/createdAt`] = Date.now();
    });

    db.ref().update(updates)
        .then(() => {
            document.getElementById("staffInp").value = "";
        })
        .catch(err => {
            console.error("addNewStaff error", err);
            alert("Ошибка при добавлении сотрудника");
        });
}
function toggleWorkCell(path, name, day, isWork) {
    if (!isAdmin) return;
    const ref = db.ref(`schedule/${path}/${scheduleMode}/${name}/${day}`);
    if (isWork) {
        ref.remove();
    } else {
        ref.set("10-22");
    }
}

function setupPresence() { const r = db.ref(`presence/${currentUser}`); r.set("online"); r.onDisconnect().remove(); db.ref("presence").on("value", snap => { const m = document.getElementById("presence-mini"); m.innerHTML = ""; Object.keys(snap.val()||{}).forEach(() => m.innerHTML += `<div style="width:6px;height:6px;background:var(--online);border-radius:50%;"></div>`); }); }
function uploadAvatar(input) { if(input.files[0]) { const r = new FileReader(); r.onload = e => db.ref(`users/${currentUser}/avatar`).set(e.target.result); r.readAsDataURL(input.files[0]); } }
function logout() { localStorage.clear(); location.reload(); }
