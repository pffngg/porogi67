<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Технические работы</title>
  <style>
    /* Общий сброс и фон */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 10%, #0b0f1a, #030508);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    .card {
      position: relative;
      max-width: 750px;
      width: 100%;
      background: rgba(18, 26, 40, 0.6);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 56px;
      padding: 48px 40px 56px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(120, 180, 255, 0.15);
      overflow: hidden;
      transition: box-shadow 0.4s ease;
      text-align: center;
      color: #f0f7ff;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* Анимированный фон за карточкой (пульсирующие кольца) */
    .card::before {
      content: '';
      position: absolute;
      top: -60%;
      left: -30%;
      width: 160%;
      height: 160%;
      background: radial-gradient(circle at 30% 40%, rgba(0, 180, 255, 0.08), transparent 60%);
      animation: breatheGlow 8s infinite alternate ease-in-out;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes breatheGlow {
      0% { transform: scale(1) translate(0, 0); opacity: 0.4; }
      100% { transform: scale(1.2) translate(5%, -5%); opacity: 0.9; }
    }

    /* Все содержимое поверх фона */
    .card > * {
      position: relative;
      z-index: 2;
    }

    /* Заголовок с иконкой */
    .header-icon {
      display: inline-block;
      font-size: 4.2rem;
      line-height: 1;
      margin-bottom: 6px;
      animation: floatIcon 3s infinite ease-in-out;
      filter: drop-shadow(0 8px 20px rgba(0, 140, 255, 0.3));
    }

    @keyframes floatIcon {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(4deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #d6eaff, #8fcbff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(60, 160, 255, 0.2);
      margin-top: 4px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(200, 225, 255, 0.7);
      margin-top: 8px;
      font-weight: 300;
      letter-spacing: 0.3px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
      padding-bottom: 18px;
    }

    /* Таймер */
    .timer-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 32px 0 28px;
      flex-wrap: wrap;
    }

    .timer-item {
      background: rgba(0, 20, 40, 0.35);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 12px 16px 8px;
      min-width: 80px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 20px rgba(0, 100, 255, 0.05);
      transition: transform 0.25s ease, border-color 0.3s;
    }

    .timer-item:hover {
      transform: scale(1.04);
      border-color: rgba(100, 180, 255, 0.3);
    }

    .timer-number {
      font-size: 3.2rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(to bottom, #f0f9ff, #b0d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: block;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0, 160, 255, 0.3);
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(180, 215, 255, 0.6);
      margin-top: 6px;
      font-weight: 400;
    }

    /* Блок даты окончания */
    .end-date-block {
      background: rgba(0, 30, 60, 0.3);
      border-radius: 60px;
      padding: 14px 22px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin: 8px auto 22px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .end-date-block span:first-child {
      opacity: 0.7;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .end-date-block .date-value {
      font-weight: 600;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #b6dbff;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
    }

    /* Поле ввода даты (стилизованное) */
    .date-picker-area {
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      background: rgba(0, 20, 40, 0.25);
      padding: 12px 20px;
      border-radius: 60px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .date-picker-area label {
      font-size: 0.9rem;
      color: rgba(200, 225, 255, 0.6);
      letter-spacing: 0.5px;
    }

    .date-picker-area input[type="datetime-local"] {
      background: rgba(0, 10, 25, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 40px;
      padding: 10px 18px;
      color: #d4eaff;
      font-size: 0.95rem;
      font-weight: 400;
      outline: none;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      width: 210px;
      font-family: inherit;
    }

    .date-picker-area input[type="datetime-local"]:focus {
      border-color: #4c9aff;
      box-shadow: 0 0 0 3px rgba(60, 150, 255, 0.2);
    }

    .date-picker-area input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8) sepia(1) hue-rotate(190deg) brightness(1.2);
      cursor: pointer;
    }

    .btn-set {
      background: rgba(60, 150, 255, 0.15);
      border: 1px solid rgba(100, 180, 255, 0.2);
      color: #c6e0ff;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
      letter-spacing: 0.3px;
    }

    .btn-set:hover {
      background: rgba(60, 150, 255, 0.25);
      border-color: #4c9aff;
      box-shadow: 0 0 20px rgba(60, 150, 255, 0.2);
      transform: scale(1.02);
    }

    /* сообщение о завершении */
    .finished-message {
      font-size: 1.8rem;
      font-weight: 600;
      color: #a0d0ff;
      text-shadow: 0 0 30px rgba(0, 180, 255, 0.3);
      padding: 12px 0;
      letter-spacing: 1px;
      background: rgba(0, 255, 200, 0.03);
      border-radius: 60px;
      border: 1px solid rgba(0, 255, 200, 0.08);
      backdrop-filter: blur(4px);
    }

    .footer-note {
      margin-top: 26px;
      font-size: 0.8rem;
      color: rgba(180, 210, 255, 0.25);
      letter-spacing: 1px;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      padding-top: 20px;
    }

    /* Адаптивность */
    @media (max-width: 550px) {
      .card { padding: 32px 20px 40px; }
      h1 { font-size: 2.2rem; }
      .timer-grid { gap: 10px; }
      .timer-item { min-width: 65px; padding: 10px 10px 6px; }
      .timer-number { font-size: 2.4rem; }
      .date-picker-area input[type="datetime-local"] { width: 160px; }
      .end-date-block { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Иконка с анимацией -->
    <div class="header-icon">⚙️</div>
    <h1>Технические работы</h1>
    <div class="subtitle">Мы обновляем сервис, чтобы сделать его ещё лучше</div>

    <!-- Таймер -->
    <div class="timer-grid" id="timerGrid">
      <div class="timer-item">
        <span class="timer-number" id="days">00</span>
        <span class="timer-label">Дней</span>
      </div>
      <div class="timer-item">
        <span class="timer-number" id="hours">00</span>
        <span class="timer-label">Часов</span>
      </div>
      <div class="timer-item">
        <span class="timer-number" id="minutes">00</span>
        <span class="timer-label">Минут</span>
      </div>
      <div class="timer-item">
        <span class="timer-number" id="seconds">00</span>
        <span class="timer-label">Секунд</span>
      </div>
    </div>

    <!-- Дата окончания (отображается) -->
    <div class="end-date-block" id="endDateDisplay">
      <span>⏳ Окончание работ:</span>
      <span class="date-value" id="endDateText">—</span>
    </div>

    <!-- Управление датой -->
    <div class="date-picker-area">
      <label for="endDateTime">📅 Установить дату:</label>
      <input type="datetime-local" id="endDateTime">
      <button class="btn-set" id="setDateBtn">Применить</button>
    </div>

    <!-- Сообщение, когда таймер истёк (по умолчанию скрыто) -->
    <div id="finishedMessage" class="finished-message" style="display: none;">✅ Работы завершены!</div>

    <div class="footer-note">Следите за обновлениями</div>
  </div>

  <script>
    (function() {
      "use strict";

      // DOM-элементы
      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');
      const endDateText = document.getElementById('endDateText');
      const endDateTimeInput = document.getElementById('endDateTime');
      const setDateBtn = document.getElementById('setDateBtn');
      const timerGrid = document.getElementById('timerGrid');
      const finishedMessage = document.getElementById('finishedMessage');

      // Переменная для хранения конечной даты (объект Date)
      let endDate = null;

      // ID интервала
      let intervalId = null;

      // Флаг, что таймер завершён (чтобы не обновлять)
      let isFinished = false;

      // ---------- Функции форматирования ----------
      function padZero(num) {
        return String(num).padStart(2, '0');
      }

      // Обновление отображения таймера и даты
      function updateTimer() {
        if (!endDate) {
          // Если дата не задана – показываем прочерки
          daysEl.textContent = '--';
          hoursEl.textContent = '--';
          minutesEl.textContent = '--';
          secondsEl.textContent = '--';
          endDateText.textContent = '—';
          return;
        }

        const now = new Date();
        const diff = endDate.getTime() - now.getTime();

        // Если время истекло или дата в прошлом
        if (diff <= 0) {
          // Останавливаем таймер, показываем сообщение
          if (!isFinished) {
            isFinished = true;
            if (intervalId) {
              clearInterval(intervalId);
              intervalId = null;
            }
            // Прячем таймер, показываем "Работы завершены"
            timerGrid.style.display = 'none';
            finishedMessage.style.display = 'block';
            // обновим текст даты
            endDateText.textContent = endDate.toLocaleString('ru-RU', {
              day: '2-digit', month: '2-digit', year: 'numeric',
              hour: '2-digit', minute: '2-digit'
            });
          }
          return;
        }

        // Если таймер был скрыт (например, после завершения) – показываем
        if (isFinished) {
          isFinished = false;
          timerGrid.style.display = 'flex';
          finishedMessage.style.display = 'none';
        }

        // Вычисляем дни, часы, минуты, секунды
        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = Math.floor(totalSeconds % 60);

        // Обновляем DOM
        daysEl.textContent = padZero(days);
        hoursEl.textContent = padZero(hours);
        minutesEl.textContent = padZero(minutes);
        secondsEl.textContent = padZero(seconds);

        // Обновляем отображение даты окончания
        endDateText.textContent = endDate.toLocaleString('ru-RU', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      }

      // ---------- Установка новой даты ----------
      function setNewEndDate(dateString) {
        if (!dateString) {
          // Если строка пустая – игнорируем
          return;
        }

        const parsed = new Date(dateString);
        // Проверка на валидность
        if (isNaN(parsed.getTime())) {
          alert('Пожалуйста, выберите корректную дату и время.');
          return;
        }

        // Если дата в прошлом (относительно сейчас) – можно разрешить, но покажем 00:00:00 и потом завершим
        // Но лучше всё равно установить, и таймер корректно отработает
        endDate = parsed;

        // Если таймер остановлен (был завершён) – перезапускаем
        if (isFinished) {
          isFinished = false;
          timerGrid.style.display = 'flex';
          finishedMessage.style.display = 'none';
        }

        // Если интервал не запущен – запускаем
        if (!intervalId) {
          intervalId = setInterval(updateTimer, 500);
        }

        // Обновляем таймер сразу
        updateTimer();

        // Также сохраняем в localStorage (опционально)
        try {
          localStorage.setItem('maintenanceEndDate', dateString);
        } catch (e) { /* ignore */ }
      }

      // ---------- Загрузка сохранённой даты из localStorage ----------
      function loadSavedDate() {
        try {
          const saved = localStorage.getItem('maintenanceEndDate');
          if (saved) {
            const parsed = new Date(saved);
            if (!isNaN(parsed.getTime())) {
              endDate = parsed;
              // Устанавливаем значение в input
              endDateTimeInput.value = saved;
              // Запускаем таймер
              if (!intervalId) {
                intervalId = setInterval(updateTimer, 500);
              }
              updateTimer();
              return true;
            }
          }
        } catch (e) { /* ignore */ }
        return false;
      }

      // ---------- Обработчики событий ----------
      // Кнопка "Применить"
      setDateBtn.addEventListener('click', function() {
        const val = endDateTimeInput.value;
        if (!val) {
          alert('Пожалуйста, выберите дату и время.');
          return;
        }
        setNewEndDate(val);
      });

      // Также можно по нажатию Enter в поле ввода
      endDateTimeInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          setDateBtn.click();
        }
      });

      // ---------- Инициализация ----------
      // Пробуем загрузить сохранённую дату
      const hasSaved = loadSavedDate();

      if (!hasSaved) {
        // Если сохранённой нет – ставим дату по умолчанию: через 3 дня от текущего момента
        const defaultDate = new Date();
        defaultDate.setDate(defaultDate.getDate() + 3);
        // Округляем до ближайшего часа (для красоты)
        defaultDate.setMinutes(0, 0, 0);
        // Форматируем для input datetime-local
        const year = defaultDate.getFullYear();
        const month = padZero(defaultDate.getMonth() + 1);
        const day = padZero(defaultDate.getDate());
        const hours = padZero(defaultDate.getHours());
        const minutes = padZero(defaultDate.getMinutes());
        const defaultStr = `${year}-${month}-${day}T${hours}:${minutes}`;

        endDateTimeInput.value = defaultStr;
        // Устанавливаем дату
        setNewEndDate(defaultStr);
      } else {
        // Если загрузили, синхронизируем input с сохранённым значением
        if (endDate) {
          const d = endDate;
          const year = d.getFullYear();
          const month = padZero(d.getMonth() + 1);
          const day = padZero(d.getDate());
          const hours = padZero(d.getHours());
          const minutes = padZero(d.getMinutes());
          endDateTimeInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
        }
      }

      // Дополнительно: если таймер уже завершён при загрузке – корректно отобразить
      // Эту ситуацию обработает updateTimer() при первом вызове (если endDate в прошлом)
      // Но чтобы точно сработало, вызовем ещё раз после инициализации
      setTimeout(() => {
        if (endDate) {
          // Принудительно проверим состояние
          const now = new Date();
          if (endDate.getTime() <= now.getTime()) {
            // Если дата в прошлом – триггерим завершение
            // Просто вызовем updateTimer (он сам выставит isFinished)
            updateTimer();
          }
        }
      }, 100);

      // На случай, если вкладка была скрыта и таймер "заснул" – обновим при фокусе
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && endDate) {
          updateTimer();
        }
      });

    })();
  </script>
</body>
</html>
