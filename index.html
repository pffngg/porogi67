<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>porogi</title>

    <!-- Подключаем стили из отдельного файла -->
    <link rel="stylesheet" href="css/style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>
<div class="version-tag">test v 1.06 big 12.04.26</div>

<div id="context-menu"><div style="color:#ff3b30;" id="ctx-delete">Удалить</div></div>

<div id="reportModal" class="modal-overlay">
    <div class="modal-content">
        <img src="https://media.tenor.com/716m2S_T-94AAAAM/shrek-dance.gif" style="width: 150px; border-radius: 20px; margin-bottom: 15px;">
        <h2 style="margin:0;">СМЕНА ЗАКРЫТА!(</h2>
        <div id="reportDetails" style="margin: 20px 0; font-size: 16px; line-height: 1.6; text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;"></div>
        <button class="primary" style="width:100%" onclick="document.getElementById('reportModal').style.display='none'">КРАСАВА</button>
    </div>
</div>

<div id="profileModal" class="modal-overlay" onclick="if(event.target.id==='profileModal') document.getElementById('profileModal').style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="profileAvatarPreview" class="avatar" style="width:100px; height:100px; margin-bottom:15px; cursor:pointer;" onclick="triggerAvatarInput()">
        <div id="profileName" style="font-weight:800; margin-bottom:10px;"></div>
        <div id="profileRole" style="font-size:12px; color:#aaa; margin-bottom:10px;"></div>
        <button id="profileEditBtn" class="glass-btn" style="margin-bottom:10px;" onclick="triggerAvatarInput()">Изменить фото</button>
        <div id="avatarEditor" style="display:none; text-align:center; margin-bottom:15px;">
            <div style="position:relative; width:220px; height:220px; margin:0 auto 12px; border-radius:50%; overflow:hidden; background:#111; border:1px solid rgba(255,255,255,0.1);">
                <canvas id="avatarCanvas" width="220" height="220" style="width:100%; height:100%;"></canvas>
            </div>
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom:10px;">
                <button class="glass-btn" style="padding:10px 14px;" onclick="zoomAvatar(-0.05)">-</button>
                <button class="glass-btn" style="padding:10px 14px;" onclick="zoomAvatar(0.05)">+</button>
            </div>
            <button class="primary" style="width:100%; margin-bottom:10px;" onclick="saveAvatar()">Сохранить</button>
            <button class="glass-btn" style="width:100%;" onclick="cancelAvatarEdit()">Отмена</button>
        </div>
        <div id="profileStats" style="text-align:left; line-height:1.7; color:#ddd; margin-bottom:20px;"></div>
        <button class="primary" style="width:100%; margin-bottom:10px;" onclick="document.getElementById('profileModal').style.display='none'">Закрыть</button>
        <button class="danger" style="width:100%;" onclick="logout()">Выйти</button>
    </div>
</div>

<div id="lightbox" class="modal-overlay" onclick="this.style.display='none'"><img id="lightbox-img" style="max-width:95%; max-height:95%"></div>

<input type="file" id="avatarInp" style="display:none" accept="image/*" onchange="uploadAvatar(this)">

<div id="login" style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:15px; padding: 20px;">
  <h1>porogi</h1>
  <input id="nameInput" placeholder="Ваше имя" style="padding:15px; border-radius:15px; border:none; width: 220px; background:#111; color:#fff;" onkeydown="if(event.key==='Enter'){ event.preventDefault(); login(); }">
  <input type="password" id="codeInput" placeholder="Код" style="padding:15px; border-radius:15px; border:none; width:220px; text-align:center; background:#111; color:#fff;" onkeydown="if(event.key==='Enter'){ event.preventDefault(); login(); }">
  <button class="primary" style="width:220px" onclick="login()">Войти</button>
</div>

<div id="app">
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <div class="nav-profile" style="align-items:flex-start; gap:12px;">
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
            <img id="myAvatar" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="showProfileModal()" style="cursor:pointer;">
        </div>
        <div><div id="userTag" style="font-weight:800;"></div><div id="presence-mini" style="display:flex; gap:3px;"></div></div>
    </div>
    <div style="display:flex; gap:5px;">
        <button id="btn-main" class="primary" onclick="switchTab('main')">Смена</button>
        <button id="btn-sched" class="glass-btn" onclick="switchTab('sched')">График</button>
        <button id="btn-chat" class="glass-btn" onclick="switchTab('chat')">Чат <div id="chat-badge" class="badge">0</div></button>
        <button id="btn-settings" class="glass-btn" onclick="switchTab('settings')">⚙️</button>
    </div>
  </div>

  <div id="view-main">
    <div id="startBtnCont"><button class="primary" style="width: 100%; padding: 25px; font-size: 18px;" onclick="startShift()">КРУТИТЬ ПОРОГИ</button></div>
    
    <div id="work" style="display:none;">
      
      <div id="active-shift-info" style="margin-bottom: 15px; padding: 15px; background: var(--glass); border-radius: 15px; border: 1px solid var(--border); font-size: 14px;">
          <div id="shift-participants"></div>
      </div>

      <div class="card"><h4 style="margin:0; color:#888;">СДЭК</h4>
        <div style="display:flex; gap:15px; align-items: center;">
            <button class="success-btn ctrl-btn" style="flex:1; font-size:24px;" onclick="addCounter('cdek')">+</button>
            <div class="count" id="cdek_val" onclick="manualInput('cdek')">0</div>
            <button class="danger ctrl-btn" style="padding:10px 20px;" onclick="removeCounter('cdek')">−</button>
        </div>
      </div>
      <div class="card"><h4 style="margin:0; color:#888;">ВБ / ОЗОН</h4>
        <div style="display:flex; gap:15px; align-items: center;">
            <button class="success-btn ctrl-btn" style="flex:1; font-size:24px;" onclick="addCounter('wb')">+</button>
            <div class="count" id="wb_val" onclick="manualInput('wb')">0</div>
            <button class="danger ctrl-btn" style="padding:10px 20px;" onclick="removeCounter('wb')">−</button>
        </div>
      </div>
      <div class="card"><h4 style="margin:0; color:#888;">ДОСТАВКА</h4>
        <div style="display:flex; gap:15px; align-items: center;">
            <button class="success-btn ctrl-btn" style="flex:1; font-size:24px;" onclick="addCounter('dost')">+</button>
            <div class="count" id="dost_val" onclick="manualInput('dost')">0</div>
            <button class="danger ctrl-btn" style="padding:10px 20px;" onclick="removeCounter('dost')">−</button>
        </div>
      </div>
      <div class="card"><h4 style="margin:0; color:#888;">ОПТОВЫЕ ЗАКАЗЫ</h4>
        <div style="display:flex; gap:15px; align-items: center;">
            <button class="success-btn ctrl-btn" style="flex:1; font-size:24px;" onclick="addCounter('opt')">+</button>
            <div class="count" id="opt_val" onclick="manualInput('opt')">0</div>
            <button class="danger ctrl-btn" style="padding:10px 20px;" onclick="removeCounter('opt')">−</button>
        </div>
      </div>
      <div style="text-align:center; margin:20px 0;">
          <div style="font-size:48px; font-weight:900;" id="total">0</div>
          <div style="font-size:14px; color:#aaa; margin-top:4px;" id="optDisplay">Оптовые: 0</div>
          <div id="salaryDisplay" style="color:var(--accent); font-weight:800;">Итого: 0₽</div>
      </div>
      
      <button id="joinShiftBtn" class="success-btn" style="width:100%; padding:20px; display:none;" onclick="joinShift()">ПРИСОЕДИНИТЬСЯ К СМЕНЕ</button>
      <button id="leaveShiftBtn" class="danger" style="width:100%; padding:20px; display:none;" onclick="leaveShift()">УЙТИ СО СМЕНЫ</button>
    </div>
    <button class="glass-btn" style="width:100%; margin-top:10px;" onclick="toggleHistory()">Архив смен</button>
    <div id="history" style="display:none; margin-top:10px;"></div>
  </div>

  <div id="view-sched" style="display:none;">
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button id="t-day" class="primary" style="flex:1" onclick="setMode('day')">ДЕНЬ</button>
        <button id="t-night" class="glass-btn" style="flex:1" onclick="setMode('night')">НОЧЬ</button>
    </div>
    <div style="display:flex; justify-content: center; gap:15px; align-items: center; margin-bottom:10px;">
        <button class="glass-btn" onclick="changeMonth(-1)">←</button><span id="monthLabel" style="font-weight:700;"></span><button class="glass-btn" onclick="changeMonth(1)">→</button>
    </div>
    <div id="adminPanel" style="display:none; gap:5px; margin-bottom:10px;">
        <input id="staffInp" placeholder="Имя" style="flex:1; padding:12px; border-radius:12px; background:#111; border:none; color:#fff;" onkeydown="if(event.key==='Enter'){ event.preventDefault(); addNewStaff(); }">
        <button class="success-btn" onclick="addNewStaff()">+</button>
    </div>
    <div class="schedule-wrap"><table><thead><tr id="h-row"></tr></thead><tbody id="b-rows"></tbody></table></div>
  </div>

  <div id="view-chat" style="display:none;">
    <div id="muteBanner" class="mute-banner">Ты в муте, чел</div>
    <div id="chat-messages"></div>
    <div id="preview-area" style="display:none; margin-bottom:10px;">
        <div id="preview-info" style="font-size:12px; color:#aaa; margin-bottom:8px;">Нажми на крестик, чтобы удалить фото.</div>
        <div id="preview-imgs" style="display:flex; gap:8px; margin-bottom:10px; overflow-x:auto;"></div>
    </div>
    <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 28px; display:flex; gap:10px; align-items:center;">
        <button class="glass-btn" style="width:40px; height:40px; border-radius:50%;" onclick="document.getElementById('fileInp').click()">+</button>
        <input type="file" id="fileInp" style="display:none" accept="image/*" multiple onchange="preparePhotos(this)">
       <textarea id="chatMsg" placeholder="пиши..." style="flex:1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; color:white; outline:none; resize:none; min-height:48px; line-height:1.5; padding:12px 14px;" rows="2" onkeydown="handleChatKey(event)"></textarea>
        <button id="sendChatBtn" class="primary" onclick="sendChat()">↑</button>
    </div>
  </div>

  <div id="view-settings" style="display:none;">
    <div id="adminUsersPanel" style="display:none; margin-top:20px; gap:15px;">
      <div class="card" style="padding:15px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <div>
            <div style="font-size:16px; font-weight:800;">Админ-панель</div>
            <div style="font-size:12px; color:#aaa;">Управление пользователями и IP</div>
          </div>
          <button class="glass-btn" onclick="refreshAdminData()" style="font-size:12px; padding:8px 12px;">Обновить</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
          <input id="adminInp" placeholder="Добавить администратора" style="flex:1; padding:12px; border-radius:12px; background:#111; border:none; color:#fff;" onkeydown="if(event.key==='Enter'){ event.preventDefault(); addNewAdmin(); }">
          <button class="success-btn" onclick="addNewAdmin()">+</button>
        </div>
        <div id="adminUsersList" style="display:flex; flex-direction:column; gap:10px;"></div>
      </div>
      <div class="card" style="padding:15px;">
        <div style="font-size:16px; font-weight:800; margin-bottom:10px;">Онлайн сейчас</div>
        <div id="onlineUsersList" style="display:flex; flex-direction:column; gap:8px; color:#ddd;"></div>
      </div>
      <div class="card" style="padding:15px;">
        <div style="font-size:16px; font-weight:800; margin-bottom:10px;">Заблокированные IP</div>
        <div id="blockedIpsList" style="display:flex; flex-direction:column; gap:10px;"></div>
      </div>
    </div>
  </div>
</div>


<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/app.js"></script>
</body>
</html>
